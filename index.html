<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouDiana Smart</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #ff4757; 
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --card: rgba(255, 255, 255, 0.08);
            --text: #ffffff; 
        }

        body { font-family: 'Poppins', sans-serif; background: var(--bg-gradient); color: var(--text); margin: 0; padding: 15px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

        /* --- TELA DE LOGIN/CADASTRO --- */
        #authScreen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg-gradient); z-index: 10000; 
            display: flex; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;
        }
        .auth-container { background: rgba(255,255,255,0.1); backdrop-filter: blur(15px); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        .auth-container h2 { margin-bottom: 20px; }
        .auth-container input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: none; background: rgba(255,255,255,0.2); color: white; outline: none; box-sizing: border-box; }
        .auth-container button { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-main { background: var(--primary); color: white; }
        .btn-switch { background: transparent; color: #ccc; margin-top: 15px; font-size: 0.85rem; text-decoration: underline; }

        /* --- CONTEÚDO PRINCIPAL (Escondido por padrão) --- */
        #mainContent { display: none; width: 100%; max-width: 850px; flex-direction: column; align-items: center; }

        /* Reaproveitando seus estilos anteriores... */
        .search-container { width: 100%; position: relative; margin-bottom: 20px; display: flex; gap: 10px; }
        #searchInput { flex-grow: 1; padding: 12px 20px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); background: var(--card); color: white; outline: none; }
        
        .player-container { width: 100%; background: #000; border-radius: 15px; overflow: hidden; position: relative; aspect-ratio: 16 / 9; }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        .video-details { width: 100%; margin-top: 15px; background: var(--card); padding: 20px; border-radius: 15px; box-sizing: border-box; }
        .actions { display: flex; gap: 10px; margin: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .btn-action { background: rgba(255,255,255,0.1); border: none; color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; }
        
        .desc-text { font-size: 0.95rem; color: #ccc; line-height: 1.5; margin: 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .desc-text.expanded { -webkit-line-clamp: unset; }
        .btn-more { background: none; border: none; color: var(--primary); cursor: pointer; font-weight: 600; font-size: 0.85rem; }

        .results-list { position: absolute; top: 55px; width: 100%; background: #1e1e2e; border-radius: 10px; z-index: 100; display: none; }
        .video-item { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        
        .user-info { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 0.75rem; color: #888; }
        .btn-logout { background: none; border: none; color: var(--primary); cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <div id="authScreen">
        <div class="auth-container">
            <h2 id="authTitle">Bem-vindo!</h2>
            <input type="email" id="emailUser" placeholder="Seu e-mail">
            <input type="password" id="passUser" placeholder="Sua senha">
            <button class="btn-main" id="btnAuthAction" onclick="executarAuth()">Entrar</button>
            <button class="btn-switch" id="btnSwitchMode" onclick="alternarModo()">Não tem conta? Cadastre-se</button>
        </div>
    </div>

    <div id="mainContent">
        <div class="user-info">
            <span id="txtUserEmail">usuario@email.com</span>
            <button class="btn-logout" onclick="fazerLogout()">Sair</button>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Pesquisar vídeos..." oninput="searchVideos()">
            <div class="results-list" id="resultsList"></div>
        </div>

        <div class="player-container">
            <video id="videoPlayer" controls autoplay playsinline controlslist="nodownload"><source src="" type="video/mp4"></video>
        </div>

        <div class="video-details">
            <h3 id="playingNow" style="margin:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Escolha um vídeo</h3>
            <div class="actions">
                <button class="btn-action" id="favBtn" onclick="toggleFavorite()">⭐ Salvar</button>
                <button class="btn-action" id="likeBtn" onclick="registrarCurtida()">🤍 <b id="likeCount">0</b></button>
                <button class="btn-action" onclick="compartilhar()">🔗 Compartilhar</button>
            </div>
            <p class="desc-text" id="videoDesc">Pesquise acima para começar a assistir.</p>
            <button class="btn-more" id="btnLerMais" onclick="toggleDesc()" style="display:none;">... mais</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, onValue, update, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBc-qchU3a3Z2Jr1ijPolIT7PNHZz86G_I",
            authDomain: "youvideo-22f8a.firebaseapp.com",
            databaseURL: "https://youvideo-22f8a-default-rtdb.firebaseio.com",
            projectId: "youvideo-22f8a",
            storageBucket: "youvideo-22f8a.firebasestorage.app",
            messagingSenderId: "179003131728",
            appId: "1:179003131728:web:03874cc5df997f6c724e55"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        
        let biblioteca = [];
        let currentIndex = -1;
        let isLoginMode = true;

        // --- LÓGICA DE AUTENTICAÇÃO ---
        window.alternarModo = () => {
            isLoginMode = !isLoginMode;
            document.getElementById('authTitle').innerText = isLoginMode ? "Bem-vindo!" : "Criar Conta";
            document.getElementById('btnAuthAction').innerText = isLoginMode ? "Entrar" : "Cadastrar Agora";
            document.getElementById('btnSwitchMode').innerText = isLoginMode ? "Não tem conta? Cadastre-se" : "Já tenho conta. Entrar";
        };

        window.executarAuth = () => {
            const email = document.getElementById('emailUser').value;
            const pass = document.getElementById('passUser').value;
            if(!email || !pass) { alert("Preencha tudo!"); return; }

            if(isLoginMode) {
                signInWithEmailAndPassword(auth, email, pass).catch(e => alert("Erro ao entrar!"));
            } else {
                createUserWithEmailAndPassword(auth, email, pass).catch(e => alert("Erro ao cadastrar!"));
            }
        };

        window.fazerLogout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'flex';
                document.getElementById('txtUserEmail').innerText = user.email;
                carregarBiblioteca();
            } else {
                document.getElementById('authScreen').style.display = 'flex';
                document.getElementById('mainContent').style.display = 'none';
            }
        });

        // --- LÓGICA DO APP ---
        function carregarBiblioteca() {
            onValue(ref(db, 'videos'), (snap) => {
                const data = snap.val();
                if(data) biblioteca = Object.keys(data).map(key => ({ id_firebase: key, ...data[key] }));
            });
        }

        window.searchVideos = () => {
            const t = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('resultsList');
            if(!t) { list.style.display = 'none'; return; }
            const fits = biblioteca.filter(v => v.titulo.toLowerCase().includes(t));
            list.innerHTML = fits.map(v => `<div class="video-item" onclick="carregarVideo(${biblioteca.indexOf(v)})">${v.titulo}</div>`).join('');
            list.style.display = fits.length ? 'block' : 'none';
        };

        window.carregarVideo = (index) => {
            currentIndex = index;
            const v = biblioteca[index];
            const player = document.getElementById('videoPlayer');
            player.src = v.arquivo;
            document.getElementById('playingNow').innerText = v.titulo;
            document.getElementById('videoDesc').innerText = v.descricao || "Sem descrição.";
            document.getElementById('resultsList').style.display = 'none';
            document.getElementById('searchInput').value = '';
            document.getElementById('likeCount').innerText = v.curtidas || 0;
            
            const btnMore = document.getElementById('btnLerMais');
            btnMore.style.display = (v.descricao && v.descricao.length > 90) ? 'block' : 'none';
        };

        window.toggleDesc = () => {
            const d = document.getElementById('videoDesc');
            d.classList.toggle('expanded');
            document.getElementById('btnLerMais').innerText = d.classList.contains('expanded') ? "recolher" : "... mais";
        };

        window.registrarCurtida = () => {
            if(currentIndex === -1) return;
            const id = biblioteca[currentIndex].id_firebase;
            update(ref(db, `videos/${id}`), { curtidas: increment(1) });
        };
    </script>
</body>
</html>
