     <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tube Vídeo Smart</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #ff4757; 
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --card: rgba(255, 255, 255, 0.08);
            --text: #ffffff; 
        }

        /* --- SPLASH SCREEN (TELA DE ABERTURA) --- */
        #splash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0f0c29;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .splash-logo {
            font-size: 3rem;
            color: var(--primary);
            font-weight: bold;
            text-shadow: 0 0 25px rgba(255, 71, 87, 0.7);
            animation: pulse 2s infinite;
            font-family: 'Poppins', sans-serif;
        }

        .loader {
            width: 45px;
            height: 45px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            margin-top: 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- ESTILOS GERAIS --- */
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            opacity: 0;
            transition: opacity 1.2s ease;
        }

        body.loaded { opacity: 1; }

        header h1 {
            font-size: 2.2rem;
            color: var(--primary);
            text-shadow: 0 4px 15px rgba(255, 71, 87, 0.3);
            margin-bottom: 25px;
        }

        /* BUSCA DINÂMICA */
        .search-container {
            width: 100%;
            max-width: 650px;
            position: relative;
            margin-bottom: 30px;
        }

        input { 
            width: 100%; 
            padding: 16px 25px; 
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
            background: var(--card);
            backdrop-filter: blur(15px);
            color: white; 
            outline: none; 
            font-size: 1rem;
            box-sizing: border-box;
            transition: 0.4s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(255, 71, 87, 0.3); }

        .results-list { 
            position: absolute;
            top: 70px;
            left: 0;
            width: 100%; 
            background: #1e1e2e;
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
            z-index: 100;
            max-height: 300px;
            overflow-y: auto;
            display: none;
        }

        .video-item { 
            padding: 18px 25px; 
            cursor: pointer; 
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }
        .video-item:hover { background: var(--primary); transform: scale(1.02); }

        /* PLAYER DE VÍDEO */
        .player-container {
            position: relative;
            width: 100%;
            max-width: 850px;
            background: #000;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 30px 70px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.1);
        }

        video { width: 100%; display: block; }

        .overlay-controls {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 85%;
            display: flex; justify-content: center; align-items: center;
            gap: 25px; opacity: 0; transition: opacity 0.4s ease;
            pointer-events: none; z-index: 10;
        }

        .player-container:hover .overlay-controls { opacity: 1; }

        .btn-overlay {
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 50%;
            cursor: pointer;
            width: 70px; height: 70px;
            font-size: 1.5rem; transition: 0.3s;
        }

        .btn-overlay:hover { transform: scale(1.15); background: var(--primary); }

        /* INFO E BOTÕES SOCIAIS */
        .video-info {
            width: 100%;
            max-width: 850px;
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 0 15px;
        }

        #playingNow { font-size: 1.5rem; margin: 0; font-weight: 600; text-transform: capitalize; }
        #countDisplay { font-size: 0.9rem; color: #bbb; margin-top: 6px; }

        .actions { display: flex; gap: 15px; }

        .btn-action {
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 12px 22px;
            border-radius: 35px;
            cursor: pointer;
            display: flex; align-items: center; gap: 10px;
            transition: 0.3s; font-weight: 600;
        }

        .btn-action:hover { background: rgba(255,255,255,0.15); transform: translateY(-3px); }
        .btn-action.active { color: var(--primary); border-color: var(--primary); }
    </style>
</head>
<body>

    <div id="splash">
        <div class="splash-logo">TUBE SMART</div>
        <div class="loader"></div>
    </div>

    <header><h1>Tube Vídeo Smart</h1></header>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="O que vamos assistir hoje?" oninput="searchVideos()" autocomplete="off">
        <div class="results-list" id="resultsList"></div>
    </div>

    <div class="player-container">
        <video id="videoPlayer" controls autoplay>
            <source id="videoSource" src="" type="video/mp4">
        </video>
        <div class="overlay-controls">
            <button class="btn-overlay" onclick="playPrevious()">⏮</button>
            <button class="btn-overlay" onclick="skipTime(-10)">-10s</button>
            <button class="btn-overlay" onclick="skipTime(10)">+10s</button>
            <button class="btn-overlay" onclick="playNext()">⏭</button>
        </div>
    </div>

    <div class="video-info">
        <div>
            <h3 id="playingNow">Selecione um vídeo</h3>
            <p id="countDisplay">0 curtidas • 0 compartilhamentos</p>
        </div>
        <div class="actions">
            <button class="btn-action" id="likeBtn" onclick="registrarCurtida()">
                <span id="likeIcon">🤍</span> <small id="likeCount">0</small>
            </button>
            <button class="btn-action" onclick="registrarCompartilhamento()">
                <span>🔗</span> <small id="shareCount">0</small>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // CONFIGURAÇÃO DO SEU FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBc-qchU3a3Z2Jr1ijPolIT7PNHZz86G_I",
            authDomain: "youvideo-22f8a.firebaseapp.com",
            databaseURL: "https://youvideo-22f8a-default-rtdb.firebaseio.com",
            projectId: "youvideo-22f8a",
            storageBucket: "youvideo-22f8a.firebasestorage.app",
            messagingSenderId: "179003131728",
            appId: "1:179003131728:web:03874cc5df997f6c724e55"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const videosRef = ref(db, 'videos');

        const videoPlayer = document.getElementById('videoPlayer');
        const resultsList = document.getElementById('resultsList');
        const searchInput = document.getElementById('searchInput');
        const playingNow = document.getElementById('playingNow');
        const countDisplay = document.getElementById('countDisplay');

        let biblioteca = [];
        let currentIndex = -1;

        // CONTROLE DA TELA DE ABERTURA
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash');
                splash.style.opacity = '0';
                setTimeout(() => { 
                    splash.style.visibility = 'hidden'; 
                    document.body.classList.add('loaded');
                }, 800);
            }, 2500); 
        });

        // SINCRONIZAÇÃO EM TEMPO REAL COM FIREBASE
        onValue(videosRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                biblioteca = Object.keys(data).map(key => ({ id_firebase: key, ...data[key] }));
                
                // Atualiza contadores do vídeo atual se ele estiver a passar
                if (currentIndex !== -1) {
                    const videoAtu = biblioteca.find(v => v.id_firebase === biblioteca[currentIndex].id_firebase);
                    if (videoAtu) atualizarContadoresTela(videoAtu);
                }
            }
        });

        window.carregarVideo = function(index) {
            if (index < 0 || index >= biblioteca.length) return;
            currentIndex = index;
            const video = biblioteca[index];
            
            videoPlayer.src = video.arquivo;
            videoPlayer.load();
            videoPlayer.play();
            
            playingNow.innerText = video.titulo;
            atualizarContadoresTela(video);
            
            // Reseta ícone de like visualmente
            document.getElementById('likeIcon').innerText = "🤍";
            document.getElementById('likeBtn').classList.remove('active');
            resultsList.style.display = 'none';
            searchInput.value = '';
        };

        function atualizarContadoresTela(video) {
            const likes = video.curtidas || 0;
            const shares = video.compartilhamentos || 0;
            document.getElementById('likeCount').innerText = likes;
            document.getElementById('shareCount').innerText = shares;
            countDisplay.innerText = `${likes} curtidas • ${shares} compartilhamentos`;
        }

        // REGISTAR CURTIDA (FIREBASE)
        window.registrarCurtida = function() {
            if (currentIndex === -1) return;
            const videoId = biblioteca[currentIndex].id_firebase;
            update(ref(db, `videos/${videoId}`), { curtidas: increment(1) });
            document.getElementById('likeIcon').innerText = "❤️";
            document.getElementById('likeBtn').classList.add('active');
        };

        // COMPARTILHAR (MOBILE NATIVO / PC CLIPBOARD)
        window.registrarCompartilhamento = function() {
            if (currentIndex === -1) return;
            const videoId = biblioteca[currentIndex].id_firebase;
            const titulo = biblioteca[currentIndex].titulo;

            if (navigator.share) {
                navigator.share({
                    title: 'Tube Vídeo Smart',
                    text: `Olha este vídeo no meu novo app: "${titulo}"`,
                    url: window.location.href
                }).then(() => {
                    update(ref(db, `videos/${videoId}`), { compartilhamentos: increment(1) });
                });
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert("Link copiado para a área de transferência!");
                update(ref(db, `videos/${videoId}`), { compartilhamentos: increment(1) });
            }
        };

        // NAVEGAÇÃO DO PLAYER
        window.skipTime = function(s) { videoPlayer.currentTime += s; };
        window.playNext = function() { carregarVideo((currentIndex + 1) % biblioteca.length); };
        window.playPrevious = function() { carregarVideo((currentIndex - 1 + biblioteca.length) % biblioteca.length); };

        // BUSCA
        window.searchVideos = function() {
            const termo = searchInput.value.toLowerCase();
            if (termo.length === 0) { resultsList.style.display = 'none'; return; }
            const filtrados = biblioteca.filter(v => v.titulo.toLowerCase().includes(termo));
            if (filtrados.length > 0) { renderLista(filtrados); resultsList.style.display = 'block'; }
            else { resultsList.style.display = 'none'; }
        };

        function renderLista(lista) {
            resultsList.innerHTML = '';
            lista.forEach((video) => {
                const realIndex = biblioteca.findIndex(b => b.id_firebase === video.id_firebase);
                const d = document.createElement('div');
                d.className = 'video-item'; 
                d.innerText = video.titulo;
                d.onclick = () => carregarVideo(realIndex);
                resultsList.appendChild(d);
            });
        }

        // FECHAR BUSCA AO CLICAR FORA
        document.addEventListener('click', (e) => {
            if (!document.querySelector('.search-container').contains(e.target)) resultsList.style.display = 'none';
        });

        // REPRODUÇÃO AUTOMÁTICA (PRÓXIMO VÍDEO)
        videoPlayer.onended = () => playNext();
    </script>
</body>
</html>
