<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouDiana Smart</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #ff4757; 
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --card: rgba(255, 255, 255, 0.08);
            --text: #ffffff; 
        }

        body { font-family: 'Poppins', sans-serif; background: var(--bg-gradient); color: var(--text); margin: 0; padding: 15px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; box-sizing: border-box; }

        /* --- TELA DE LOGIN --- */
        #authScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-gradient); z-index: 10000; display: flex; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .auth-container { background: rgba(255,255,255,0.1); backdrop-filter: blur(15px); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; }
        .auth-container input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: none; background: rgba(255,255,255,0.2); color: white; box-sizing: border-box; outline: none; }
        .btn-main { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; background: var(--primary); color: white; }
        .btn-switch { background: transparent; color: #ccc; margin-top: 15px; border: none; text-decoration: underline; cursor: pointer; font-size: 0.85rem; }

        /* --- CONTEÚDO --- */
        #mainContent { display: none; width: 100%; max-width: 850px; flex-direction: column; }
        .user-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 0.8rem; opacity: 0.8; }
        
        .search-container { position: relative; width: 100%; margin-bottom: 20px; }
        #searchInput { width: 100%; padding: 12px 20px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); background: var(--card); color: white; box-sizing: border-box; outline: none; }
        .results-list { position: absolute; top: 55px; width: 100%; background: #1e1e2e; border-radius: 15px; z-index: 100; display: none; max-height: 300px; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .video-item { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }

        /* --- PLAYER PRINCIPAL --- */
        .player-container { width: 100%; background: #000; border-radius: 15px; overflow: hidden; position: relative; aspect-ratio: 16 / 9; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        .main-video { width: 100%; height: 100%; }
        .overlay-controls { position: absolute; top: 0; width: 100%; height: 80%; display: flex; justify-content: center; align-items: center; gap: 20px; opacity: 0; transition: 0.3s; z-index: 10; pointer-events: none; }
        .player-container:hover .overlay-controls { opacity: 1; }
        .btn-overlay { background: rgba(0,0,0,0.6); color: white; border: none; padding: 15px; border-radius: 50%; cursor: pointer; pointer-events: auto; font-size: 1.2rem; }

        /* --- INFO E BOTÕES --- */
        .video-details { margin-top: 15px; background: var(--card); padding: 20px; border-radius: 15px; }
        #playingNow { margin: 0; font-size: 1.2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 600; }
        .actions { display: flex; gap: 10px; margin: 15px 0; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); flex-wrap: wrap; }
        .btn-action { background: rgba(255,255,255,0.1); border: none; color: white; padding: 8px 16px; border-radius: 20px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 0.85rem; }
        .btn-action.active { color: #f39c12; background: rgba(243, 156, 18, 0.15); }
        
        .desc-text { font-size: 0.9rem; color: #bbb; line-height: 1.5; margin: 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .desc-text.expanded { -webkit-line-clamp: unset; }
        .btn-more { background: none; border: none; color: var(--primary); cursor: pointer; font-weight: bold; margin-top: 5px; font-size: 0.8rem; padding: 0; }

        /* --- SEÇÃO DE DESTAQUES (MINI PLAYERS) --- */
        .highlights-section { margin-top: 25px; width: 100%; }
        .highlights-section h4 { margin: 0 0 15px 0; color: #fff; font-size: 1.1rem; }
        
        .highlights-container { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px; }
        .highlights-container::-webkit-scrollbar { height: 6px; }
        .highlights-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        
        .highlight-card { 
            flex: 0 0 180px; background: var(--card); border-radius: 12px; 
            overflow: hidden; cursor: pointer; transition: 0.3s; position: relative;
        }
        .highlight-card:hover { transform: scale(1.05); background: rgba(255,255,255,0.15); }
        
        /* O segredo do Mini Player */
        .mini-video-box { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; overflow: hidden; }
        .mini-video { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; transition: 0.3s; }
        .highlight-card:hover .mini-video { opacity: 1; }

        .card-info { padding: 10px; }
        .card-info b { display: block; font-size: 0.75rem; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-info span { font-size: 0.65rem; color: #aaa; }
    </style>
</head>
<body>

    <div id="authScreen">
        <div class="auth-container">
            <h2 id="authTitle">YouDiana Login</h2>
            <input type="email" id="emailUser" placeholder="E-mail">
            <input type="password" id="passUser" placeholder="Senha">
            <button class="btn-main" onclick="executarAuth()">Acessar</button>
            <button class="btn-switch" onclick="alternarModo()">Não tem conta? Cadastre-se</button>
        </div>
    </div>

    <div id="mainContent">
        <div class="user-header">
            <span id="txtUserEmail">...</span>
            <button class="btn-logout" onclick="fazerLogout()">Sair</button>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Buscar vídeo..." oninput="searchVideos()">
            <div class="results-list" id="resultsList"></div>
        </div>

        <div class="player-container">
            <video id="videoPlayer" class="main-video" controls autoplay playsinline></video>
            <div class="overlay-controls">
                <button class="btn-overlay" onclick="playPrevious()">⏮</button>
                <button class="btn-overlay" onclick="skipTime(-10)">-10s</button>
                <button class="btn-overlay" onclick="skipTime(10)">+10s</button>
                <button class="btn-overlay" onclick="playNext()">⏭</button>
            </div>
        </div>

        <div class="video-details">
            <h3 id="playingNow">Selecione um vídeo</h3>
            <div class="actions">
                <button class="btn-action" id="favBtn" onclick="toggleFavorite()"><span id="favIcon">☆</span> Salvar</button>
                <button class="btn-action" id="likeBtn" onclick="registrarCurtida()"><span id="likeIcon">🤍</span> <b id="likeCount">0</b></button>
                <button class="btn-action" onclick="compartilhar()"><span>🔗</span> Compartilhar</button>
            </div>
            <p class="desc-text" id="videoDesc">Pesquise por títulos na barra acima.</p>
            <button class="btn-more" id="btnLerMais" onclick="toggleDesc()" style="display:none;">... mais</button>
        </div>

        <div class="highlights-section">
            <h4>🔥 Em Destaque (Passe o mouse)</h4>
            <div class="highlights-container" id="highlightsList"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, onValue, update, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBc-qchU3a3Z2Jr1ijPolIT7PNHZz86G_I",
            authDomain: "youvideo-22f8a.firebaseapp.com",
            databaseURL: "https://youvideo-22f8a-default-rtdb.firebaseio.com",
            projectId: "youvideo-22f8a",
            storageBucket: "youvideo-22f8a.firebasestorage.app",
            messagingSenderId: "179003131728",
            appId: "1:179003131728:web:03874cc5df997f6c724e55"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        
        let biblioteca = [];
        let currentIndex = -1;
        let meusFavoritos = JSON.parse(localStorage.getItem('favs_user')) || [];
        let isLoginMode = true;

        const videoPlayer = document.getElementById('videoPlayer');

        // --- AUTH ---
        window.alternarModo = () => {
            isLoginMode = !isLoginMode;
            document.getElementById('authTitle').innerText = isLoginMode ? "YouVideo Login" : "Criar Conta";
        };

        window.executarAuth = () => {
            const email = document.getElementById('emailUser').value;
            const pass = document.getElementById('passUser').value;
            if(isLoginMode) signInWithEmailAndPassword(auth, email, pass).catch(() => alert("Erro no login!"));
            else createUserWithEmailAndPassword(auth, email, pass).catch(() => alert("Erro ao cadastrar!"));
        };

        window.fazerLogout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'flex';
                document.getElementById('txtUserEmail').innerText = user.email;
                conectarBanco();
            } else {
                document.getElementById('authScreen').style.display = 'flex';
                document.getElementById('mainContent').style.display = 'none';
            }
        });

        function conectarBanco() {
            onValue(ref(db, 'videos'), (snap) => {
                const data = snap.val();
                if(data) {
                    biblioteca = Object.keys(data).map(key => ({ id_firebase: key, ...data[key] }));
                    renderHighlights();
                }
            });
        }

        // --- RENDERIZAR MINI PLAYERS ---
        function renderHighlights() {
            const list = document.getElementById('highlightsList');
            const sorted = [...biblioteca].sort((a,b) => (b.curtidas || 0) - (a.curtidas || 0)).slice(0, 6);
            
            list.innerHTML = sorted.map(v => {
                const idx = biblioteca.indexOf(v);
                return `
                    <div class="highlight-card" 
                         onmouseover="this.querySelector('video').play()" 
                         onmouseout="this.querySelector('video').pause(); this.querySelector('video').currentTime = 0;"
                         onclick="carregarVideo(${idx})">
                        <div class="mini-video-box">
                            <video class="mini-video" muted loop playsinline>
                                <source src="${v.arquivo}" type="video/mp4">
                            </video>
                        </div>
                        <div class="card-info">
                            <b>${v.titulo}</b>
                            <span>❤️ ${v.curtidas || 0}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.carregarVideo = (index) => {
            currentIndex = index;
            const v = biblioteca[index];
            videoPlayer.src = v.arquivo;
            videoPlayer.play();
            document.getElementById('playingNow').innerText = v.titulo;
            document.getElementById('videoDesc').innerText = v.descricao || "";
            document.getElementById('likeCount').innerText = v.curtidas || 0;
            verificarFavorito(v.id_firebase);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        // --- CONTROLES AUXILIARES ---
        window.playNext = () => carregarVideo((currentIndex + 1) % biblioteca.length);
        window.playPrevious = () => carregarVideo((currentIndex - 1 + biblioteca.length) % biblioteca.length);
        window.skipTime = (s) => videoPlayer.currentTime += s;
        window.searchVideos = () => {
            const t = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('resultsList');
            if(!t) { list.style.display = 'none'; return; }
            const fits = biblioteca.filter(v => v.titulo.toLowerCase().includes(t));
            list.innerHTML = fits.map(v => `<div class="video-item" onclick="carregarVideo(${biblioteca.indexOf(v)})">${v.titulo}</div>`).join('');
            list.style.display = fits.length ? 'block' : 'none';
        };

        window.registrarCurtida = () => {
            if(currentIndex === -1) return;
            update(ref(db, `videos/${biblioteca[currentIndex].id_firebase}`), { curtidas: increment(1) });
            document.getElementById('likeIcon').innerText = "❤️";
        };

        window.toggleFavorite = () => {
            const id = biblioteca[currentIndex].id_firebase;
            const p = meusFavoritos.indexOf(id);
            if(p > -1) meusFavoritos.splice(p, 1); else meusFavoritos.push(id);
            localStorage.setItem('favs_user', JSON.stringify(meusFavoritos));
            verificarFavorito(id);
        };

        function verificarFavorito(id) {
            const isFav = meusFavoritos.includes(id);
            document.getElementById('favIcon').innerText = isFav ? "⭐" : "☆";
            document.getElementById('favBtn').classList.toggle('active', isFav);
        }

        window.compartilhar = () => navigator.share ? navigator.share({url: window.location.href}) : alert("Link copiado!");
        window.toggleDesc = () => {
            const d = document.getElementById('videoDesc');
            d.classList.toggle('expanded');
            document.getElementById('btnLerMais').innerText = d.classList.contains('expanded') ? "recolher" : "... mais";
        };
    </script>
</body>
</html>
