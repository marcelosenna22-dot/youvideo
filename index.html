<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouDiana Smart Adaptive</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #ff4757; 
            --bg-gradient: linear-gradient(135deg, #000000, #121212, #000000);
            --card: rgba(255, 255, 255, 0.08);
            --text: #ffffff; 
        }

        body { 
            font-family: 'Poppins', sans-serif; background: var(--bg-gradient); color: var(--text); 
            margin: 0; padding: 10px; min-height: 100vh; display: flex; flex-direction: column; 
            align-items: center; box-sizing: border-box; overflow-x: hidden; 
        }

        /* --- AUTH --- */
        #authScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 10000; display: flex; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .auth-container { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; }
        .auth-container input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: none; background: rgba(255,255,255,0.1); color: white; box-sizing: border-box; outline: none; }
        .btn-main { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; background: var(--primary); color: white; }

        /* --- LAYOUT --- */
        #mainContent { display: none; width: 100%; max-width: 850px; flex-direction: column; position: relative; }
        .app-logo { font-size: 1.4rem; font-weight: 600; color: white; margin-bottom: 5px; }
        
        /* SEARCH */
        .search-container { position: relative; width: 100%; margin-bottom: 15px; }
        #searchInput { width: 100%; padding: 10px 15px 10px 40px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); background: var(--card); color: white; box-sizing: border-box; outline: none; }
        .results-list { position: absolute; top: 45px; width: 100%; background: #111; border-radius: 15px; z-index: 100; display: none; flex-direction: column; max-height: 200px; overflow-y: auto; border: 1px solid #333; }
        .video-item { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }

        /* --- PLAYER ADAPTATIVO (EXPANSÍVEL) --- */
        .player-container { 
            width: 100%; 
            background: #000; 
            border-radius: 15px; 
            overflow: hidden; 
            position: relative; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            transition: all 0.5s ease; /* Transição suave ao mudar de formato */
            max-height: 80vh; /* Não deixa o vídeo vertical sumir da tela */
        }
        .main-video { 
            width: 100%; 
            max-height: 80vh; 
            display: block; 
            object-fit: contain; 
        }

        /* CONTROLES */
        .overlay-controls { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; gap: 12px; background: rgba(0,0,0,0.3); opacity: 0; transition: opacity 0.3s; z-index: 5; pointer-events: none; }
        .overlay-controls.active { opacity: 1; pointer-events: auto; }
        .btn-overlay { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(5px); color: white; border: 1px solid rgba(255,255,255,0.1); padding: 10px; border-radius: 50%; cursor: pointer; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; }

        /* BARRA LATERAL FIXA */
        .side-controls { position: absolute; right: 10px; bottom: 40px; display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 20; }
        .btn-side { background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.15); color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .btn-side span { font-size: 0.6rem; font-weight: 600; }

        .btn-fs { position: absolute; right: 10px; top: 10px; background: rgba(0,0,0,0.4); border: none; color: white; width: 35px; height: 35px; border-radius: 8px; cursor: pointer; z-index: 10; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }

        /* --- COMENTÁRIOS --- */
        .comments-section { margin-top: 10px; background: var(--card); border-radius: 12px; overflow: hidden; }
        .comments-header { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-size: 0.85rem; }
        #commentsBody { display: none; padding: 12px; border-top: 1px solid rgba(255,255,255,0.05); }
        .comment-input-wrapper { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; margin-bottom: 15px; border: 1px solid rgba(255,71,87,0.2); }
        .comment-input-group { display: flex; gap: 8px; }
        .comment-input-group input { flex: 1; padding: 10px 15px; border-radius: 20px; border: none; background: #000; color: white; outline: none; font-size: 0.85rem; }
        
        .comment-list { max-height: 250px; overflow-y: auto; font-size: 0.8rem; }
        .comment-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.03); transition: opacity 0.4s; }
        .comment-user { color: var(--primary); font-weight: 600; font-size: 0.75rem; display: block; }
        .btn-delete-comment { background: none; border: none; color: #555; cursor: pointer; padding: 5px; }

        /* LISTAS */
        .section-title { margin: 20px 0 10px 0; font-size: 0.9rem; font-weight: 600; }
        .scroll-container { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .video-card { flex: 0 0 140px; background: var(--card); border-radius: 10px; overflow: hidden; cursor: pointer; }
        .thumb-video { width: 100%; aspect-ratio: 16/9; object-fit: cover; opacity: 0.7; }
        
        .loader { position: absolute; width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; display: none; z-index: 10; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>

<body>

    <div id="authScreen">
        <div class="auth-container">
            <h2 id="authTitle">YouDiana Login</h2>
            <input type="email" id="emailUser" placeholder="E-mail">
            <input type="password" id="passUser" placeholder="Senha">
            <button class="btn-main" onclick="executarAuth()">Acessar</button>
        </div>
    </div>

    <div id="mainContent">
        <div class="app-logo">YouDiana Smart</div>
        
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Pesquisar..." oninput="searchVideos()">
            <div class="results-list" id="resultsList"></div>
        </div>

        <div class="player-container" id="playerArea" onclick="mostrarControles()">
            <div class="loader" id="videoLoader"></div>
            <video id="videoPlayer" class="main-video" playsinline></video>
            <button class="btn-fs" onclick="toggleFullScreen(event)">⛶</button>

            <div class="side-controls">
                <button class="btn-side" onclick="registrarCurtida()">❤️ <span id="likeCountSide">0</span></button>
                <button class="btn-side" onclick="focarComentario()">🗨 <span id="commentCountSide">0</span></button>
                <button class="btn-side" onclick="registrarCompartilhamento()">↪ <span id="shareCountSide">0</span></button>
            </div>

            <div class="overlay-controls" id="controlsPanel">
                <button class="btn-overlay" onclick="event.stopPropagation(); playPrevious()">⏮</button>
                <button class="btn-overlay" onclick="event.stopPropagation(); skipTime(-10)">-10</button>
                <button class="btn-overlay" style="width: 55px; height: 55px;" onclick="event.stopPropagation(); togglePlay()"><span id="playIcon">⏸</span></button>
                <button class="btn-overlay" onclick="event.stopPropagation(); skipTime(10)">+10</button>
                <button class="btn-overlay" onclick="event.stopPropagation(); playNext()">⏭</button>
            </div>
        </div>

        <div style="margin-top: 10px; background: var(--card); padding: 12px; border-radius: 12px;">
            <h3 id="playingNow" style="margin:0; font-size: 1rem;">Carregando...</h3>
            <p id="videoDesc" style="font-size: 0.8rem; color: #aaa;" onclick="this.classList.toggle('expanded')"></p>
        </div>

        <div class="comments-section" id="sectionComments">
            <div class="comments-header" onclick="toggleComments()">
                <span>🗨 Comentários (<span id="commentCount">0</span>)</span>
                <span id="commentArrow">▼</span>
            </div>
            <div id="commentsBody">
                <div class="comment-input-wrapper">
                    <div class="comment-input-group">
                        <input type="text" id="newComment" placeholder="Comentar...">
                        <button class="btn-main" style="width: auto; padding: 0 15px;" onclick="enviarComentario()">Postar</button>
                    </div>
                </div>
                <div class="comment-list" id="commentList"></div>
            </div>
        </div>

        <h4 class="section-title">✨ Adicionados recentemente</h4>
        <div class="scroll-container" id="recentList"></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, onValue, set, push, update, increment, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBc-qchU3a3Z2Jr1ijPolIT7PNHZz86G_I",
        authDomain: "youvideo-22f8a.firebaseapp.com",
        databaseURL: "https://youvideo-22f8a-default-rtdb.firebaseio.com",
        projectId: "youvideo-22f8a",
        storageBucket: "youvideo-22f8a.firebasestorage.app",
        messagingSenderId: "179003131728",
        appId: "1:179003131728:web:03874cc5df997f6c724e55"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let biblioteca = [];
    let currentIndex = -1;
    let userAtual = null;
    let controlTimer;

    // AUTH
    window.executarAuth = () => {
        const email = document.getElementById('emailUser').value;
        const senha = document.getElementById('passUser').value;
        signInWithEmailAndPassword(auth, email, senha).catch(() => alert("Erro no login"));
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            userAtual = user;
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('mainContent').style.display = 'flex';
            conectarBanco();
        } else {
            document.getElementById('authScreen').style.display = 'flex';
        }
    });

    // PLAYER LOGIC
    window.mostrarControles = () => {
        const p = document.getElementById('controlsPanel');
        p.classList.add('active');
        clearTimeout(controlTimer);
        controlTimer = setTimeout(() => p.classList.remove('active'), 2500);
    };

    window.togglePlay = () => {
        const vp = document.getElementById('videoPlayer');
        vp.paused ? vp.play() : vp.pause();
        document.getElementById('playIcon').innerText = vp.paused ? "▶" : "⏸";
    };

    window.toggleFullScreen = (e) => {
        e.stopPropagation();
        const container = document.getElementById('playerArea');
        if (!document.fullscreenElement) container.requestFullscreen?.();
        else document.exitFullscreen?.();
    };

    // ADAPTIVE PLAYER
    function conectarBanco() {
        onValue(ref(db, 'videos'), (snap) => {
            const data = snap.val();
            if(data) {
                biblioteca = Object.keys(data).map(k => ({ id_firebase: k, ...data[k] }));
                if(currentIndex === -1) carregarVideo(biblioteca.length - 1);
                renderLists();
            }
        });
    }

    window.carregarVideo = (idx) => {
        if(idx < 0 || idx >= biblioteca.length) return;
        currentIndex = idx;
        const v = biblioteca[idx];
        const vp = document.getElementById('videoPlayer');
        
        // Resetando animação e carregando fonte
        vp.src = v.arquivo;
        vp.play();

        document.getElementById('playingNow').innerText = v.titulo;
        document.getElementById('videoDesc').innerText = v.descricao || "";
        document.getElementById('likeCountSide').innerText = v.curtidas || 0;
        document.getElementById('shareCountSide').innerText = v.compartilhamentos || 0;
        
        carregarComentarios(v.id_firebase);
    };

    // COMENTÁRIOS COM EXCLUSÃO
    function carregarComentarios(videoId) {
        onValue(ref(db, `comentarios/${videoId}`), (s) => {
            const data = s.val();
            const count = data ? Object.keys(data).length : 0;
            document.getElementById('commentCount').innerText = count;
            document.getElementById('commentCountSide').innerText = count;
            const list = document.getElementById('commentList');
            if(!data) { list.innerHTML = "Seja o primeiro!"; return; }

            list.innerHTML = Object.keys(data).reverse().map(key => {
                const c = data[key];
                const isOwner = userAtual && c.uid === userAtual.uid;
                return `
                    <div class="comment-item" id="c-${key}">
                        <div style="flex:1">
                            <span class="comment-user">${c.usuario}</span>
                            ${c.texto}
                        </div>
                        ${isOwner ? `<button class="btn-delete-comment" onclick="excluirComentario('${key}')">🗑️</button>` : ''}
                    </div>
                `;
            }).join('');
        });
    }

    window.excluirComentario = (commentId) => {
        if(confirm("Apagar comentário?")) {
            const item = document.getElementById(`c-${commentId}`);
            if(item) item.style.opacity = '0'; // Efeito visual antes de sumir
            
            const videoId = biblioteca[currentIndex].id_firebase;
            setTimeout(() => {
                remove(ref(db, `comentarios/${videoId}/${commentId}`));
            }, 400);
        }
    };

    window.enviarComentario = () => {
        const input = document.getElementById('newComment');
        if(!input.value.trim()) return;
        const videoId = biblioteca[currentIndex].id_firebase;
        push(ref(db, `comentarios/${videoId}`), {
            uid: userAtual.uid,
            usuario: userAtual.email.split('@')[0],
            texto: input.value,
            data: Date.now()
        });
        input.value = "";
    };

    window.focarComentario = () => {
        document.getElementById('commentsBody').style.display = 'block';
        const input = document.getElementById('newComment');
        input.scrollIntoView({ behavior: 'smooth', block: 'center' });
        input.focus();
    };

    window.toggleComments = () => {
        const b = document.getElementById('commentsBody');
        b.style.display = b.style.display === 'block' ? 'none' : 'block';
    };

    window.registrarCurtida = () => update(ref(db, `videos/${biblioteca[currentIndex].id_firebase}`), { curtidas: increment(1) });
    
    window.registrarCompartilhamento = () => {
        navigator.clipboard.writeText(window.location.href);
        alert("Link copiado!");
        update(ref(db, `videos/${biblioteca[currentIndex].id_firebase}`), { compartilhamentos: increment(1) });
    };

    function renderLists() {
        const recent = [...biblioteca].reverse().slice(0, 10);
        document.getElementById('recentList').innerHTML = recent.map(v => `
            <div class="video-card" onclick="carregarVideo(${biblioteca.indexOf(v)})">
                <video class="thumb-video" src="${v.arquivo}"></video>
                <div style="padding:5px; font-size:0.7rem;"><b>${v.titulo}</b></div>
            </div>`).join('');
    }

    window.playNext = () => carregarVideo((currentIndex + 1) % biblioteca.length);
    window.playPrevious = () => carregarVideo((currentIndex - 1 + biblioteca.length) % biblioteca.length);
    window.skipTime = (s) => document.getElementById('videoPlayer').currentTime += s;

    const loader = document.getElementById('videoLoader'), vp = document.getElementById('videoPlayer');
    vp.onwaiting = () => loader.style.display = 'block';
    vp.onplaying = () => loader.style.display = 'none';
    vp.onended = () => window.playNext();
</script>
</body>
</html>
