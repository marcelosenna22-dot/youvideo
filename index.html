     <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouVideo Smart</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #ff4757; 
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --card: rgba(255, 255, 255, 0.08);
            --text: #ffffff; 
        }

        /* --- SPLASH SCREEN COM ANIMAÇÃO --- */
        #splash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0f0c29;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.6s ease;
        }

        .splash-text {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            letter-spacing: -1px;
            animation: reveal 2s ease-in-out forwards;
        }

        .splash-text span { color: var(--primary); }

        @keyframes reveal {
            0% { opacity: 0; transform: translateY(20px); filter: blur(10px); }
            50% { opacity: 1; filter: blur(0px); text-shadow: 0 0 20px var(--primary); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* --- ESTILOS DO APP --- */
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header h1 {
            font-size: 1.8rem;
            color: var(--primary);
            margin-bottom: 20px;
        }

        .search-container {
            width: 100%;
            max-width: 600px;
            position: relative;
            margin-bottom: 25px;
        }

        input { 
            width: 100%; 
            padding: 14px 25px; 
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
            background: var(--card);
            backdrop-filter: blur(10px);
            color: white; 
            outline: none;
            box-sizing: border-box;
        }

        .results-list { 
            position: absolute;
            top: 60px; left: 0; width: 100%; 
            background: #1e1e2e;
            border-radius: 15px;
            z-index: 100;
            max-height: 250px;
            overflow-y: auto;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .video-item { padding: 15px 20px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }

        /* PLAYER CORRIGIDO */
        .player-container {
            width: 100%;
            max-width: 850px;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 16 / 9; /* Mantém a proporção sem partir ao meio */
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        video { width: 100%; height: 100%; object-fit: contain; }

        .overlay-controls {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            gap: 20px; opacity: 0; transition: 0.3s;
            background: rgba(0,0,0,0.3);
            pointer-events: none;
        }

        .player-container:hover .overlay-controls { opacity: 1; }

        .btn-overlay {
            pointer-events: auto;
            background: rgba(0,0,0,0.6);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 50%;
            cursor: pointer;
            width: 60px; height: 60px;
        }

        /* INFO BOX MINIMALISTA */
        .video-info {
            width: 100%;
            max-width: 850px;
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5px;
        }

        #playingNow { font-size: 1.1rem; margin: 0; font-weight: 600; color: #fff; }

        .actions { display: flex; gap: 10px; }

        .btn-action {
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            display: flex; align-items: center; gap: 6px;
            font-size: 0.9rem;
        }

        .btn-action.active { color: var(--primary); border-color: var(--primary); }
    </style>
</head>
<body>

    <div id="splash">
        <div class="splash-text">YouVideo <span>Smart</span></div>
    </div>

    <header><h1>YouVideo Smart</h1></header>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Pesquisar..." oninput="searchVideos()" autocomplete="off">
        <div class="results-list" id="resultsList"></div>
    </div>

    <div class="player-container">
        <video id="videoPlayer" controls autoplay poster="https://via.placeholder.com/850x480/0f0c29/ffffff?text=Selecione+um+Vídeo">
            <source id="videoSource" src="" type="video/mp4">
        </video>
        <div class="overlay-controls">
            <button class="btn-overlay" onclick="playPrevious()">⏮</button>
            <button class="btn-overlay" onclick="skipTime(-10)">-10s</button>
            <button class="btn-overlay" onclick="skipTime(10)">+10s</button>
            <button class="btn-overlay" onclick="playNext()">⏭</button>
        </div>
    </div>

    <div class="video-info">
        <h3 id="playingNow">Aguardando...</h3>
        <div class="actions">
            <button class="btn-action" id="likeBtn" onclick="registrarCurtida()">
                <span id="likeIcon">🤍</span> <b id="likeCount">0</b>
            </button>
            <button class="btn-action" onclick="registrarCompartilhamento()">
                <span>🔗</span> <b id="shareCount">0</b>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBc-qchU3a3Z2Jr1ijPolIT7PNHZz86G_I",
            authDomain: "youvideo-22f8a.firebaseapp.com",
            databaseURL: "https://youvideo-22f8a-default-rtdb.firebaseio.com",
            projectId: "youvideo-22f8a",
            storageBucket: "youvideo-22f8a.firebasestorage.app",
            messagingSenderId: "179003131728",
            appId: "1:179003131728:web:03874cc5df997f6c724e55"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const videosRef = ref(db, 'videos');

        const videoPlayer = document.getElementById('videoPlayer');
        const resultsList = document.getElementById('resultsList');
        const searchInput = document.getElementById('searchInput');
        const playingNow = document.getElementById('playingNow');

        let biblioteca = [];
        let currentIndex = -1;

        // FECHAR SPLASH SCREEN
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash');
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 600);
            }, 3000); // 3 segundos de animação
        });

        onValue(videosRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                biblioteca = Object.keys(data).map(key => ({ id_firebase: key, ...data[key] }));
                if (currentIndex !== -1) {
                    const v = biblioteca.find(item => item.id_firebase === biblioteca[currentIndex].id_firebase);
                    if (v) {
                        document.getElementById('likeCount').innerText = v.curtidas || 0;
                        document.getElementById('shareCount').innerText = v.compartilhamentos || 0;
                    }
                }
            }
        });

        window.carregarVideo = function(index) {
            if (index < 0 || index >= biblioteca.length) return;
            currentIndex = index;
            const video = biblioteca[index];
            videoPlayer.src = video.arquivo;
            videoPlayer.load();
            videoPlayer.play();
            playingNow.innerText = video.titulo;
            document.getElementById('likeCount').innerText = video.curtidas || 0;
            document.getElementById('shareCount').innerText = video.compartilhamentos || 0;
            document.getElementById('likeIcon').innerText = "🤍";
            document.getElementById('likeBtn').classList.remove('active');
            resultsList.style.display = 'none';
            searchInput.value = '';
        };

        window.registrarCurtida = function() {
            if (currentIndex === -1) return;
            const videoId = biblioteca[currentIndex].id_firebase;
            update(ref(db, `videos/${videoId}`), { curtidas: increment(1) });
            document.getElementById('likeIcon').innerText = "❤️";
            document.getElementById('likeBtn').classList.add('active');
        };

        window.registrarCompartilhamento = function() {
            if (currentIndex === -1) return;
            const videoId = biblioteca[currentIndex].id_firebase;
            if (navigator.share) {
                navigator.share({ title: 'YouVideo Smart', url: window.location.href }).then(() => {
                    update(ref(db, `videos/${videoId}`), { compartilhamentos: increment(1) });
                });
            } else {
                navigator.clipboard.writeText(window.location.href);
                update(ref(db, `videos/${videoId}`), { compartilhamentos: increment(1) });
                alert("Link copiado!");
            }
        };

        window.skipTime = function(s) { videoPlayer.currentTime += s; };
        window.playNext = function() { carregarVideo((currentIndex + 1) % biblioteca.length); };
        window.playPrevious = function() { carregarVideo((currentIndex - 1 + biblioteca.length) % biblioteca.length); };

        window.searchVideos = function() {
            const termo = searchInput.value.toLowerCase();
            if (termo.length === 0) { resultsList.style.display = 'none'; return; }
            const filtrados = biblioteca.filter(v => v.titulo.toLowerCase().includes(termo));
            if (filtrados.length > 0) { renderLista(filtrados); resultsList.style.display = 'block'; }
            else { resultsList.style.display = 'none'; }
        };

        function renderLista(lista) {
            resultsList.innerHTML = '';
            lista.forEach((video) => {
                const realIndex = biblioteca.findIndex(b => b.id_firebase === video.id_firebase);
                const d = document.createElement('div');
                d.className = 'video-item'; d.innerText = video.titulo;
                d.onclick = () => carregarVideo(realIndex);
                resultsList.appendChild(d);
            });
        }

        videoPlayer.onended = () => playNext();
    </script>
</body>
</html>
