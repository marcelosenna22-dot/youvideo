<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouVideo Smart</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #ff4757; 
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --card: rgba(255, 255, 255, 0.08);
            --text: #ffffff; 
        }

        /* --- SPLASH SCREEN --- */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f0c29; display: flex; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.8s ease;
        }
        .splash-text { font-size: 2.8rem; font-weight: 700; color: #fff; animation: glow-text 2s ease-in-out infinite alternate; }
        .splash-text span { color: var(--primary); }
        @keyframes glow-text { from { text-shadow: 0 0 10px rgba(255,255,255,0.2); transform: scale(0.95); } to { text-shadow: 0 0 30px var(--primary); transform: scale(1); } }

        /* --- ESTILOS GERAIS --- */
        body {
            font-family: 'Poppins', sans-serif; background: var(--bg-gradient);
            background-attachment: fixed; color: var(--text); margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .search-container { width: 100%; max-width: 600px; position: relative; margin-bottom: 25px; display: flex; gap: 10px; }
        input { 
            flex-grow: 1; padding: 14px 25px; border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1); background: var(--card);
            backdrop-filter: blur(10px); color: white; outline: none;
        }

        .btn-fav-toggle {
            background: var(--card); border: 1px solid rgba(255,255,255,0.1);
            color: white; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; font-size: 1.2rem;
        }

        /* --- PLAYER --- */
        .player-container {
            width: 100%; max-width: 850px; background: #000;
            border-radius: 20px; overflow: hidden; position: relative;
            aspect-ratio: 16 / 9; box-shadow: 0 25px 60px rgba(0,0,0,0.6);
        }
        .player-placeholder { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle, #1e1e3f 0%, #000 100%); z-index: 1; }
        .wave { width: 5px; height: 30px; background: var(--primary); margin: 0 3px; border-radius: 10px; animation: wave-anim 1s linear infinite; }
        @keyframes wave-anim { 0%, 100% { height: 10px; } 50% { height: 50px; } }
        video { width: 100%; height: 100%; object-fit: contain; position: relative; z-index: 2; display: none; }
        video.active { display: block; }

        .overlay-controls { position: absolute; top: 0; left: 0; width: 100%; height: 75%; display: flex; justify-content: center; align-items: center; gap: 20px; opacity: 0; transition: 0.3s; background: rgba(0,0,0,0.2); z-index: 10; pointer-events: none; }
        .player-container:hover .overlay-controls { opacity: 1; }
        .btn-overlay { background: rgba(0,0,0,0.7); color: white; border: none; padding: 15px; border-radius: 50%; cursor: pointer; width: 60px; height: 60px; font-size: 1.2rem; pointer-events: auto; }

        /* --- INFO & ACTIONS --- */
        .video-info { width: 100%; max-width: 850px; margin-top: 15px; display: flex; justify-content: space-between; align-items: center; }
        .actions { display: flex; gap: 10px; }
        .btn-action { background: var(--card); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 8px 15px; border-radius: 20px; display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .btn-action.active { border-color: gold; color: gold; }

        /* --- LISTAS (BUSCA E FAVORITOS) --- */
        .results-list, .favorites-panel { 
            position: absolute; top: 60px; left: 0; width: 100%; 
            background: #1e1e2e; border-radius: 15px; z-index: 100; 
            max-height: 300px; overflow-y: auto; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .video-item { padding: 15px 20px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; }
        .video-item:hover { background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div id="splash">
        <div class="splash-text">YouVideo <span>Smart</span></div>
    </div>

    <header><h1>YouVideo Smart</h1></header>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Pesquisar vídeos..." oninput="searchVideos()" autocomplete="off">
        <button class="btn-fav-toggle" onclick="toggleFavoritesPanel()" title="Meus Favoritos">⭐</button>
        <div class="results-list" id="resultsList"></div>
        <div class="favorites-panel" id="favoritesPanel"></div>
    </div>

    <div class="player-container">
        <div class="player-placeholder" id="placeholder">
            <div class="wave"></div><div class="wave"></div><div class="wave"></div><div class="wave"></div>
        </div>
        <video id="videoPlayer" controls autoplay playsinline controlslist="nodownload">
            <source src="" type="video/mp4">
        </video>
        <div class="overlay-controls">
            <button class="btn-overlay" onclick="playPrevious()">⏮</button>
            <button class="btn-overlay" onclick="skipTime(-10)">-10s</button>
            <button class="btn-overlay" onclick="skipTime(10)">+10s</button>
            <button class="btn-overlay" onclick="playNext()">⏭</button>
        </div>
    </div>

    <div class="video-info">
        <h3 id="playingNow">Pronto para começar!</h3>
        <div class="actions">
            <button class="btn-action" id="favBtn" onclick="toggleFavorite()">
                <span id="favIcon">☆</span>
            </button>
            <button class="btn-action" id="likeBtn" onclick="registrarCurtida()">
                <span id="likeIcon">🤍</span> <b id="likeCount">0</b>
            </button>
            <button class="btn-action" onclick="registrarCompartilhamento()">
                <span>🔗</span> <b id="shareCount">0</b>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBc-qchU3a3Z2Jr1ijPolIT7PNHZz86G_I",
            authDomain: "youvideo-22f8a.firebaseapp.com",
            databaseURL: "https://youvideo-22f8a-default-rtdb.firebaseio.com",
            projectId: "youvideo-22f8a",
            storageBucket: "youvideo-22f8a.firebasestorage.app",
            messagingSenderId: "179003131728",
            appId: "1:179003131728:web:03874cc5df997f6c724e55"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const videosRef = ref(db, 'videos');

        const videoPlayer = document.getElementById('videoPlayer');
        const placeholder = document.getElementById('placeholder');
        const resultsList = document.getElementById('resultsList');
        const favoritesPanel = document.getElementById('favoritesPanel');
        const searchInput = document.getElementById('searchInput');

        let biblioteca = [];
        let currentIndex = -1;
        let meusFavoritos = JSON.parse(localStorage.getItem('favs_youvideo')) || [];

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => document.getElementById('splash').style.display = 'none', 800);
            }, 3000);
        });

        onValue(videosRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                biblioteca = Object.keys(data).map(key => ({ id_firebase: key, ...data[key] }));
                if (currentIndex !== -1) {
                    const v = biblioteca.find(item => item.id_firebase === biblioteca[currentIndex].id_firebase);
                    if (v) {
                        document.getElementById('likeCount').innerText = v.curtidas || 0;
                        document.getElementById('shareCount').innerText = v.compartilhamentos || 0;
                    }
                }
            }
        });

        window.carregarVideo = function(index) {
            if (index < 0 || index >= biblioteca.length) return;
            currentIndex = index;
            const video = biblioteca[index];
            placeholder.style.display = 'none';
            videoPlayer.classList.add('active');
            videoPlayer.src = video.arquivo;
            videoPlayer.load();
            videoPlayer.play().catch(() => { videoPlayer.muted = true; videoPlayer.play(); });
            
            document.getElementById('playingNow').innerText = video.titulo;
            document.getElementById('likeCount').innerText = video.curtidas || 0;
            document.getElementById('shareCount').innerText = video.compartilhamentos || 0;
            document.getElementById('likeIcon').innerText = "🤍";
            
            // Atualiza ícone de favorito
            checkFavoriteStatus(video.id_firebase);
            
            resultsList.style.display = 'none';
            favoritesPanel.style.display = 'none';
            searchInput.value = '';
        };

        // --- LÓGICA DE FAVORITOS ---
        window.toggleFavorite = function() {
            if (currentIndex === -1) return;
            const videoId = biblioteca[currentIndex].id_firebase;
            const idx = meusFavoritos.indexOf(videoId);
            
            if (idx > -1) {
                meusFavoritos.splice(idx, 1);
            } else {
                meusFavoritos.push(videoId);
            }
            
            localStorage.setItem('favs_youvideo', JSON.stringify(meusFavoritos));
            checkFavoriteStatus(videoId);
        };

        function checkFavoriteStatus(id) {
            const isFav = meusFavoritos.includes(id);
            document.getElementById('favIcon').innerText = isFav ? "⭐" : "☆";
            document.getElementById('favBtn').classList.toggle('active', isFav);
        }

        window.toggleFavoritesPanel = function() {
            if (favoritesPanel.style.display === 'block') {
                favoritesPanel.style.display = 'none';
            } else {
                renderFavorites();
                favoritesPanel.style.display = 'block';
                resultsList.style.display = 'none';
            }
        };

        function renderFavorites() {
            favoritesPanel.innerHTML = '<h4 style="padding:15px;margin:0;color:gold;">⭐ Meus Favoritos</h4>';
            const favsData = biblioteca.filter(v => meusFavoritos.includes(v.id_firebase));
            
            if (favsData.length === 0) {
                favoritesPanel.innerHTML += '<p style="padding:15px;color:#888;">Nenhum favorito ainda.</p>';
                return;
            }

            favsData.forEach(video => {
                const realIndex = biblioteca.findIndex(b => b.id_firebase === video.id_firebase);
                const d = document.createElement('div');
                d.className = 'video-item';
                d.innerHTML = `<span>${video.titulo}</span> <span>▶️</span>`;
                d.onclick = () => carregarVideo(realIndex);
                favoritesPanel.appendChild(d);
            });
        }

        // --- OUTRAS FUNÇÕES ---
        window.registrarCurtida = function() {
            if (currentIndex === -1) return;
            update(ref(db, `videos/${biblioteca[currentIndex].id_firebase}`), { curtidas: increment(1) });
            document.getElementById('likeIcon').innerText = "❤️";
        };

        window.registrarCompartilhamento = function() {
            if (currentIndex === -1) return;
            if (navigator.share) {
                navigator.share({ title: 'YouVideo Smart', url: window.location.href }).then(() => {
                    update(ref(db, `videos/${biblioteca[currentIndex].id_firebase}`), { compartilhamentos: increment(1) });
                });
            }
        };

        window.skipTime = function(s) { videoPlayer.currentTime += s; };
        window.playNext = function() { carregarVideo((currentIndex + 1) % biblioteca.length); };
        window.playPrevious = function() { carregarVideo((currentIndex - 1 + biblioteca.length) % biblioteca.length); };
        window.searchVideos = function() {
            const termo = searchInput.value.toLowerCase();
            if (termo.length === 0) { resultsList.style.display = 'none'; return; }
            const filtrados = biblioteca.filter(v => v.titulo.toLowerCase().includes(termo));
            renderLista(filtrados);
            resultsList.style.display = 'block';
            favoritesPanel.style.display = 'none';
        };

        function renderLista(lista) {
            resultsList.innerHTML = '';
            lista.forEach(video => {
                const realIndex = biblioteca.findIndex(b => b.id_firebase === video.id_firebase);
                const d = document.createElement('div');
                d.className = 'video-item'; d.innerText = video.titulo;
                d.onclick = () => carregarVideo(realIndex);
                resultsList.appendChild(d);
            });
        }

        videoPlayer.onended = () => playNext();
    </script>
</body>
</html>
