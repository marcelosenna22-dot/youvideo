<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouDiana Smart</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #ff4757; 
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --card: rgba(255, 255, 255, 0.08);
            --text: #ffffff; 
        }

        body { font-family: 'Poppins', sans-serif; background: var(--bg-gradient); color: var(--text); margin: 0; padding: 10px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; box-sizing: border-box; overflow-x: hidden; }

        /* --- TELA DE ABERTURA (SPLASH) --- */
        #splashScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-gradient);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 20000; transition: opacity 0.8s ease, visibility 0.8s;
        }
        .splash-logo {
            font-size: 2.5rem; font-weight: 600; color: white;
            text-shadow: 0 0 20px rgba(255, 71, 87, 0.6);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        /* --- TELA DE LOGIN --- */
        #authScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-gradient); z-index: 10000; display: none; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .auth-container { background: rgba(255,255,255,0.1); backdrop-filter: blur(15px); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; }
        .auth-container input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: none; background: rgba(255,255,255,0.2); color: white; box-sizing: border-box; outline: none; }
        .btn-main { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; background: var(--primary); color: white; }
        .btn-switch { background: transparent; color: #ccc; margin-top: 15px; border: none; text-decoration: underline; cursor: pointer; font-size: 0.85rem; }

        /* --- CONTEÚDO PRINCIPAL --- */
        #mainContent { display: none; width: 100%; max-width: 850px; flex-direction: column; position: relative; }
        .app-logo { font-size: 1.4rem; font-weight: 600; color: white; text-shadow: 0 0 10px rgba(255, 71, 87, 0.4); margin-bottom: 15px; align-self: flex-start; }
        .user-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 0.75rem; opacity: 0.7; }
        
        /* BUSCA */
        .search-container { position: relative; width: 100%; margin-bottom: 20px; }
        #searchInput { width: 100%; padding: 12px 20px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); background: var(--card); color: white; box-sizing: border-box; outline: none; }
        .results-list { position: absolute; top: 55px; width: 100%; background: #1e1e2e; border-radius: 15px; z-index: 100; display: none; max-height: 200px; overflow-y: auto; }
        .video-item { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }

        /* PLAYER ADAPTÁVEL */
        .player-container { width: 100%; background: #000; border-radius: 15px; overflow: hidden; position: relative; max-height: 75vh; display: flex; justify-content: center; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .main-video { max-width: 100%; max-height: 75vh; display: block; }
        
        .overlay-controls { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; gap: 15px; opacity: 0; transition: 0.3s; z-index: 10; pointer-events: none; }
        .player-container:hover .overlay-controls { opacity: 1; }
        .btn-overlay { background: rgba(0,0,0,0.6); color: white; border: none; padding: 15px; border-radius: 50%; cursor: pointer; pointer-events: auto; font-size: 1.1rem; min-width: 50px; }
        .btn-small { font-size: 0.8rem; min-width: 40px; }

        .loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 100% { transform: translate(-50%, -50%) rotate(360deg); } }

        /* COMENTÁRIOS */
        .comments-section { margin-top: 20px; background: var(--card); padding: 15px; border-radius: 15px; }
        .comment-input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .comment-input-group input { flex: 1; padding: 10px; border-radius: 8px; border: none; background: rgba(255,255,255,0.1); color: white; }
        .comment-list { max-height: 250px; overflow-y: auto; font-size: 0.9rem; }
        .comment-item { margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .comment-user { color: var(--primary); font-weight: 600; font-size: 0.75rem; display: block; }

        /* DESTAQUES */
        .highlights-section { margin-top: 25px; width: 100%; }
        .highlights-container { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; }
        .highlight-card { flex: 0 0 140px; background: var(--card); border-radius: 10px; overflow: hidden; cursor: pointer; }
        .mini-video-box { width: 100%; aspect-ratio: 16/9; background: #000; }
        .mini-video { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
    </style>
</head>
<body onclick="document.getElementById('resultsList').style.display='none'">

    <div id="splashScreen">
        <div class="splash-logo">YouDiana Smart</div>
        <p style="opacity: 0.5; font-size: 0.8rem; margin-top: 10px;">Carregando...</p>
    </div>

    <div id="authScreen">
        <div class="auth-container">
            <h2 id="authTitle">YouDiana Login</h2>
            <input type="email" id="emailUser" placeholder="E-mail Real">
            <input type="password" id="passUser" placeholder="Senha (mín. 6 dígitos)">
            <button class="btn-main" id="btnAuthAction" onclick="executarAuth()">Acessar</button>
            <div style="margin-top: 15px; display: flex; flex-direction: column; gap: 5px;">
                <button class="btn-switch" onclick="alternarModo()" id="btnSwitchLabel">Criar nova conta</button>
                <button class="btn-switch" onclick="recuperarSenha()" style="color: var(--primary);">Esqueci a senha</button>
            </div>
        </div>
    </div>

    <div id="mainContent">
        <div class="app-logo">YouDiana Smart</div>
        
        <div class="user-header">
            <span id="txtUserEmail">...</span>
            <button onclick="fazerLogout()" style="background:none; border:none; color:var(--primary); cursor:pointer; font-size: 0.75rem;">Sair</button>
        </div>

        <div class="search-container" onclick="event.stopPropagation()">
            <input type="text" id="searchInput" placeholder="Pesquisar..." oninput="searchVideos()">
            <div class="results-list" id="resultsList"></div>
        </div>

        <div class="player-container">
            <div class="loader" id="videoLoader"></div>
            <video id="videoPlayer" class="main-video" controls autoplay playsinline></video>
            <div class="overlay-controls">
                <button class="btn-overlay" onclick="playPrevious()">⏮</button>
                <button class="btn-overlay btn-small" onclick="skipTime(-10)">-10s</button>
                <button class="btn-overlay btn-small" onclick="skipTime(10)">+10s</button>
                <button class="btn-overlay" onclick="playNext()">⏭</button>
            </div>
        </div>

        <div class="video-details" style="margin-top:15px; background:var(--card); padding:15px; border-radius:15px;">
            <h3 id="playingNow" style="margin:0; font-size: 1.1rem;">Iniciando...</h3>
            <div style="display:flex; gap:20px; margin-top:10px;">
                <button onclick="registrarCurtida()" style="background:none; border:none; color:white; cursor:pointer;">❤️ <span id="likeCount">0</span></button>
                <button onclick="compartilhar()" style="background:none; border:none; color:white; cursor:pointer;">🔗 Compartilhar</button>
            </div>
        </div>

        <div class="comments-section">
            <h4 style="margin:0 0 10px 0; font-size: 1rem;">Comentários</h4>
            <div class="comment-input-group">
                <input type="text" id="newComment" placeholder="Escreva algo...">
                <button class="btn-main" style="width: auto; padding: 0 15px;" onclick="enviarComentario()">Postar</button>
            </div>
            <div class="comment-list" id="commentList"></div>
        </div>

        <div class="highlights-section">
            <h4 style="margin-bottom:10px;">🔥 Recomendados</h4>
            <div class="highlights-container" id="highlightsList"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, sendEmailVerification, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, onValue, update, increment, push, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBc-qchU3a3Z2Jr1ijPolIT7PNHZz86G_I",
            authDomain: "youvideo-22f8a.firebaseapp.com",
            databaseURL: "https://youvideo-22f8a-default-rtdb.firebaseio.com",
            projectId: "youvideo-22f8a",
            storageBucket: "youvideo-22f8a.firebasestorage.app",
            messagingSenderId: "179003131728",
            appId: "1:179003131728:web:03874cc5df997f6c724e55"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        
        let biblioteca = [];
        let currentIndex = -1;
        let isLoginMode = true;
        let userAtual = null;

        // SPLASH
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splashScreen').style.opacity = '0';
                setTimeout(() => document.getElementById('splashScreen').style.visibility = 'hidden', 800);
            }, 3000);
        });

        // AUTH
        window.alternarModo = () => {
            isLoginMode = !isLoginMode;
            document.getElementById('authTitle').innerText = isLoginMode ? "YouDiana Login" : "Criar Conta";
            document.getElementById('btnAuthAction').innerText = isLoginMode ? "Acessar" : "Cadastrar";
            document.getElementById('btnSwitchLabel').innerText = isLoginMode ? "Criar nova conta" : "Já tenho conta";
        };

        window.executarAuth = () => {
            const e = document.getElementById('emailUser').value, p = document.getElementById('passUser').value;
            if(!e || !p) return alert("Preencha tudo!");
            if(isLoginMode) {
                signInWithEmailAndPassword(auth, e, p).then(u => {
                    if(!u.user.emailVerified) { alert("Verifique seu e-mail primeiro!"); signOut(auth); }
                }).catch(() => alert("Dados incorretos."));
            } else {
                createUserWithEmailAndPassword(auth, e, p).then(u => {
                    sendEmailVerification(u.user).then(() => { alert("Verifique seu e-mail para ativar a conta!"); signOut(auth); alternarModo(); });
                }).catch(() => alert("Erro ao cadastrar."));
            }
        };

        window.recuperarSenha = () => {
            const e = document.getElementById('emailUser').value;
            if(!e) return alert("Digite o e-mail no campo acima.");
            sendPasswordResetEmail(auth, e).then(() => alert("Link de recuperação enviado!"));
        };

        window.fazerLogout = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, (user) => {
            if (user && user.emailVerified) {
                userAtual = user;
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'flex';
                document.getElementById('txtUserEmail').innerText = user.email;
                conectarBanco();
            } else {
                document.getElementById('authScreen').style.display = 'flex';
                document.getElementById('mainContent').style.display = 'none';
            }
        });

        // BANCO E PLAYER
        function conectarBanco() {
            onValue(ref(db, 'videos'), (snap) => {
                const data = snap.val();
                if(data) {
                    biblioteca = Object.keys(data).map(key => ({ id_firebase: key, ...data[key] }));
                    if(currentIndex === -1) carregarVideo(biblioteca.length - 1);
                    renderHighlights();
                }
            });
        }

        window.carregarVideo = (index) => {
            if(index < 0 || index >= biblioteca.length) return;
            currentIndex = index;
            const v = biblioteca[index];
            const vp = document.getElementById('videoPlayer');
            vp.src = v.arquivo;
            document.getElementById('playingNow').innerText = v.titulo;
            document.getElementById('likeCount').innerText = v.curtidas || 0;
            carregarComentarios(v.id_firebase);
        };

        window.skipTime = (s) => document.getElementById('videoPlayer').currentTime += s;
        window.playNext = () => carregarVideo((currentIndex + 1) % biblioteca.length);
        window.playPrevious = () => carregarVideo((currentIndex - 1 + biblioteca.length) % biblioteca.length);

        // COMENTÁRIOS
        function carregarComentarios(videoId) {
            onValue(ref(db, `comentarios/${videoId}`), (snap) => {
                const list = document.getElementById('commentList');
                list.innerHTML = "";
                const data = snap.val();
                if(data) {
                    Object.values(data).reverse().forEach(c => {
                        list.innerHTML += `<div class="comment-item"><span class="comment-user">${c.usuario}</span><span>${c.texto}</span></div>`;
                    });
                } else { list.innerHTML = "<p style='opacity:0.4'>Sem comentários.</p>"; }
            });
        }

        window.enviarComentario = () => {
            const input = document.getElementById('newComment');
            if(!input.value.trim()) return;
            const refCom = push(ref(db, `comentarios/${biblioteca[currentIndex].id_firebase}`));
            set(refCom, { usuario: userAtual.email.split('@')[0], texto: input.value, data: Date.now() });
            input.value = "";
        };

        window.searchVideos = () => {
            const t = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('resultsList');
            if(!t) { list.style.display = 'none'; return; }
            const fits = biblioteca.filter(v => v.titulo.toLowerCase().includes(t));
            list.innerHTML = fits.map(v => `<div class="video-item" onclick="carregarVideo(${biblioteca.indexOf(v)})">${v.titulo}</div>`).join('');
            list.style.display = fits.length ? 'block' : 'none';
        };

        function renderHighlights() {
            const list = document.getElementById('highlightsList');
            list.innerHTML = [...biblioteca].reverse().slice(0, 10).map(v => `
                <div class="highlight-card" onclick="carregarVideo(${biblioteca.indexOf(v)})" onmouseover="this.querySelector('video').play()" onmouseout="this.querySelector('video').pause()">
                    <div class="mini-video-box"><video class="mini-video" muted loop><source src="${v.arquivo}"></video></div>
                    <div style="padding:5px; font-size:0.7rem;"><b>${v.titulo}</b></div>
                </div>`).join('');
        }

        window.registrarCurtida = () => update(ref(db, `videos/${biblioteca[currentIndex].id_firebase}`), { curtidas: increment(1) });
        window.compartilhar = () => navigator.share ? navigator.share({url: window.location.href}) : alert("Link copiado!");

        const loader = document.getElementById('videoLoader');
        videoPlayer.onwaiting = () => loader.style.display = 'block';
        videoPlayer.onplaying = () => loader.style.display = 'none';
        videoPlayer.onended = () => playNext();
    </script>
</body>
</html>
