<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouDiana Smart</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #ff4757; 
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --card: rgba(255, 255, 255, 0.08);
            --text: #ffffff; 
        }

        body { font-family: 'Poppins', sans-serif; background: var(--bg-gradient); color: var(--text); margin: 0; padding: 15px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; box-sizing: border-box; overflow-x: hidden; }

        /* --- TELA DE ABERTURA (SPLASH) --- */
        #splashScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-gradient);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 20000; transition: opacity 0.8s ease, visibility 0.8s;
        }
        .splash-logo {
            font-size: 2.5rem; font-weight: 600; color: white;
            text-shadow: 0 0 20px rgba(255, 71, 87, 0.6);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        /* --- TELA DE LOGIN --- */
        #authScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-gradient); z-index: 10000; display: none; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .auth-container { background: rgba(255,255,255,0.1); backdrop-filter: blur(15px); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; }
        .auth-container input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: none; background: rgba(255,255,255,0.2); color: white; box-sizing: border-box; outline: none; }
        .btn-main { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; background: var(--primary); color: white; }
        .btn-switch { background: transparent; color: #ccc; margin-top: 15px; border: none; text-decoration: underline; cursor: pointer; font-size: 0.85rem; }

        /* --- CONTEÚDO --- */
        #mainContent { display: none; width: 100%; max-width: 850px; flex-direction: column; }
        .user-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 0.8rem; opacity: 0.8; }
        
        .search-container { position: relative; width: 100%; margin-bottom: 20px; display: flex; align-items: center; }
        #searchInput { width: 100%; padding: 12px 50px 12px 20px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); background: var(--card); color: white; box-sizing: border-box; outline: none; }
        .search-icon { position: absolute; right: 15px; cursor: pointer; font-size: 1.2rem; background: none; border: none; color: white; }
        
        .results-list { position: absolute; top: 55px; width: 100%; background: #1e1e2e; border-radius: 15px; z-index: 100; display: none; max-height: 250px; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .video-item { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }

        /* --- PLAYER COM CONTROLES --- */
        .player-container { width: 100%; background: #000; border-radius: 15px; overflow: hidden; position: relative; aspect-ratio: 16 / 9; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .main-video { width: 100%; height: 100%; }
        
        .overlay-controls { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; gap: 20px; opacity: 0; transition: 0.3s; z-index: 10; pointer-events: none; }
        .player-container:hover .overlay-controls { opacity: 1; }
        
        .btn-overlay { background: rgba(0,0,0,0.6); color: white; border: none; padding: 15px; border-radius: 50%; cursor: pointer; pointer-events: auto; font-size: 1.2rem; transition: 0.2s; min-width: 55px; }
        .btn-overlay:hover { background: var(--primary); transform: scale(1.1); }
        .btn-small { font-size: 0.9rem; min-width: 45px; }

        .loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; display: none; z-index: 5; }
        @keyframes spin { 100% { transform: translate(-50%, -50%) rotate(360deg); } }

        /* --- DESTAQUES --- */
        .highlights-section { margin-top: 25px; }
        .highlights-container { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; }
        .highlight-card { flex: 0 0 160px; background: var(--card); border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.3s; }
        .highlight-card:hover { transform: translateY(-5px); }
        .mini-video-box { width: 100%; aspect-ratio: 16/9; background: #000; overflow: hidden; }
        .mini-video { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .card-info { padding: 8px; font-size: 0.7rem; }
    </style>
</head>
<body onclick="fecharSugestoes(event)">

    <div id="splashScreen">
        <div class="splash-logo">YouDiana Smart</div>
        <p style="font-size: 0.8rem; margin-top: 20px; opacity: 0.6;">Carregando sua experiência...</p>
    </div>

    <div id="authScreen">
        <div class="auth-container">
            <h2 id="authTitle">YouDiana Login</h2>
            <input type="email" id="emailUser" placeholder="E-mail">
            <input type="password" id="passUser" placeholder="Senha">
            <button class="btn-main" onclick="executarAuth()">Acessar</button>
            <button class="btn-switch" onclick="alternarModo()">Cadastre-se</button>
        </div>
    </div>

    <div id="mainContent">
        <div class="user-header">
            <span id="txtUserEmail">...</span>
            <button onclick="fazerLogout()" style="background:none; border:none; color:var(--primary); cursor:pointer; text-decoration:underline;">Sair</button>
        </div>

        <div class="search-container" onclick="event.stopPropagation()">
            <input type="text" id="searchInput" placeholder="O que vamos assistir?" oninput="searchVideos()" onkeyup="if(event.key==='Enter') searchVideos()">
            <button class="search-icon" onclick="searchVideos()">🔍</button>
            <div class="results-list" id="resultsList"></div>
        </div>

        <div class="player-container">
            <div class="loader" id="videoLoader"></div>
            <video id="videoPlayer" class="main-video" controls autoplay playsinline></video>
            
            <div class="overlay-controls">
                <button class="btn-overlay" onclick="playPrevious()">⏮</button>
                <button class="btn-overlay btn-small" onclick="skipTime(-10)">-10s</button>
                <button class="btn-overlay btn-small" onclick="skipTime(10)">+10s</button>
                <button class="btn-overlay" onclick="playNext()">⏭</button>
            </div>
        </div>

        <div class="video-details" style="margin-top:15px; background:var(--card); padding:15px; border-radius:10px;">
            <h3 id="playingNow" style="margin:0;">Iniciando...</h3>
            <p id="videoDesc" style="font-size:0.85rem; color:#bbb; margin-top:5px;"></p>
            <div style="display:flex; gap:15px; margin-top:10px;">
                <button onclick="registrarCurtida()" style="background:none; border:none; color:white; cursor:pointer; display:flex; align-items:center; gap:5px;">❤️ <span id="likeCount">0</span></button>
                <button onclick="compartilhar()" style="background:none; border:none; color:white; cursor:pointer; display:flex; align-items:center; gap:5px;">🔗 Compartilhar</button>
            </div>
        </div>

        <div class="highlights-section">
            <h4 style="margin-bottom:10px;">🔥 Recomendados</h4>
            <div class="highlights-container" id="highlightsList"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, onValue, update, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBc-qchU3a3Z2Jr1ijPolIT7PNHZz86G_I",
            authDomain: "youvideo-22f8a.firebaseapp.com",
            databaseURL: "https://youvideo-22f8a-default-rtdb.firebaseio.com",
            projectId: "youvideo-22f8a",
            storageBucket: "youvideo-22f8a.firebasestorage.app",
            messagingSenderId: "179003131728",
            appId: "1:179003131728:web:03874cc5df997f6c724e55"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        
        let biblioteca = [];
        let currentIndex = -1;
        let isLoginMode = true;
        let primeiraCarga = true;

        const videoPlayer = document.getElementById('videoPlayer');
        const loader = document.getElementById('videoLoader');

        // LÓGICA DA TELA DE SPLASH
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splashScreen');
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.visibility = 'hidden';
                    // Após o splash, o Firebase vai decidir se mostra Login ou App através do onAuthStateChanged
                }, 800);
            }, 3000); // Fica na tela por 3 segundos
        });

        videoPlayer.onwaiting = () => loader.style.display = 'block';
        videoPlayer.onplaying = () => loader.style.display = 'none';
        videoPlayer.onended = () => playNext();

        // --- AUTH ---
        window.alternarModo = () => { isLoginMode = !isLoginMode; document.getElementById('authTitle').innerText = isLoginMode ? "YouDiana Login" : "Criar Conta"; };
        window.executarAuth = () => {
            const e = document.getElementById('emailUser').value, p = document.getElementById('passUser').value;
            if(isLoginMode) signInWithEmailAndPassword(auth, e, p).catch(() => alert("Erro no login!"));
            else createUserWithEmailAndPassword(auth, e, p).catch(() => alert("Erro ao cadastrar!"));
        };
        window.fazerLogout = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'flex';
                document.getElementById('txtUserEmail').innerText = user.email;
                conectarBanco();
            } else {
                document.getElementById('authScreen').style.display = 'flex';
                document.getElementById('mainContent').style.display = 'none';
            }
        });

        function conectarBanco() {
            onValue(ref(db, 'videos'), (snap) => {
                const data = snap.val();
                if(data) {
                    biblioteca = Object.keys(data).map(key => ({ id_firebase: key, ...data[key] }));
                    if(primeiraCarga && biblioteca.length > 0) {
                        carregarVideo(biblioteca.length - 1);
                        primeiraCarga = false;
                    }
                    renderHighlights();
                }
            });
        }

        window.searchVideos = () => {
            const t = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('resultsList');
            if(!t) { list.style.display = 'none'; return; }
            const fits = biblioteca.filter(v => v.titulo.toLowerCase().includes(t));
            list.innerHTML = fits.map(v => `<div class="video-item" onclick="carregarVideo(${biblioteca.indexOf(v)})">${v.titulo}</div>`).join('');
            list.style.display = fits.length ? 'block' : 'none';
        };

        window.fecharSugestoes = (e) => {
            document.getElementById('resultsList').style.display = 'none';
        };

        window.carregarVideo = (index) => {
            if (index < 0 || index >= biblioteca.length) return;
            currentIndex = index;
            const v = biblioteca[index];
            videoPlayer.src = v.arquivo;
            videoPlayer.play();
            document.getElementById('playingNow').innerText = v.titulo;
            document.getElementById('videoDesc').innerText = v.descricao || "";
            document.getElementById('likeCount').innerText = v.curtidas || 0;
            document.getElementById('resultsList').style.display = 'none';
            document.getElementById('searchInput').value = '';
        };

        window.playNext = () => carregarVideo((currentIndex + 1) % biblioteca.length);
        window.playPrevious = () => carregarVideo((currentIndex - 1 + biblioteca.length) % biblioteca.length);
        window.skipTime = (segundos) => videoPlayer.currentTime += segundos;

        function renderHighlights() {
            const list = document.getElementById('highlightsList');
            const sorted = [...biblioteca].reverse().slice(0, 10);
            list.innerHTML = sorted.map(v => {
                const idx = biblioteca.indexOf(v);
                return `
                    <div class="highlight-card" onclick="carregarVideo(${idx})" 
                         onmouseover="this.querySelector('video').play()" onmouseout="this.querySelector('video').pause(); this.querySelector('video').currentTime = 0;">
                        <div class="mini-video-box"><video class="mini-video" muted loop playsinline><source src="${v.arquivo}"></video></div>
                        <div class="card-info"><b>${v.titulo}</b></div>
                    </div>`;
            }).join('');
        }

        window.registrarCurtida = () => update(ref(db, `videos/${biblioteca[currentIndex].id_firebase}`), { curtidas: increment(1) });
        window.compartilhar = () => navigator.share ? navigator.share({url: window.location.href}) : alert("Link copiado!");
    </script>
</body>
</html>
