<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouDiana Smart</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #ff4757; 
            --bg-gradient: linear-gradient(135deg, #000000, #1a1a1a, #000000);
            --card: rgba(255, 255, 255, 0.08);
            --text: #ffffff; 
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg-gradient); 
            color: var(--text); 
            margin: 0; 
            padding: 10px; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            box-sizing: border-box; 
            overflow-x: hidden; 
        }

        /* --- AUTH SCREEN --- */
        #authScreen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: black; z-index: 10000; display: flex; 
            justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; 
        }
        .auth-container { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(15px); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; 
        }
        .auth-container input { 
            width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: none; 
            background: rgba(255,255,255,0.1); color: white; box-sizing: border-box; outline: none; 
        }
        .btn-main { 
            width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: 600; 
            cursor: pointer; background: var(--primary); color: white; 
        }
        .btn-switch { background: transparent; color: #ccc; margin-top: 10px; border: none; text-decoration: underline; cursor: pointer; font-size: 0.85rem; }

        /* --- MAIN LAYOUT --- */
        #mainContent { display: none; width: 100%; max-width: 850px; flex-direction: column; position: relative; }
        .app-logo { font-size: 1.4rem; font-weight: 600; color: white; margin-bottom: 10px; }
        .user-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 0.75rem; opacity: 0.7; }

        /* --- SEARCH --- */
        .search-container { position: relative; width: 100%; margin-bottom: 20px; }
        #searchInput { 
            width: 100%; padding: 12px 20px 12px 45px; border-radius: 30px; 
            border: 1px solid rgba(255,255,255,0.1); background: var(--card); color: white; box-sizing: border-box; 
        }
        .search-icon-fixed { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); opacity: 0.5; }
        .results-list { 
            position: absolute; top: 50px; width: 100%; background: #111; border-radius: 15px; 
            z-index: 100; display: none; flex-direction: column; max-height: 250px; overflow-y: auto; border: 1px solid #333;
        }
        .video-item { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }

        /* --- PLAYER & SIDE CONTROLS --- */
        .player-container { 
            width: 100%; background: #000; border-radius: 20px; overflow: hidden; 
            position: relative; aspect-ratio: 16/9; display: flex; justify-content: center; align-items: center; 
        }
        .main-video { width: 100%; height: 100%; display: block; object-fit: contain; }

        .overlay-controls { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center; gap: 20px; 
            background: rgba(0,0,0,0.4); opacity: 0; transition: opacity 0.3s; z-index: 5; pointer-events: none;
        }
        .overlay-controls.active { opacity: 1; pointer-events: auto; }
        .btn-overlay { background: rgba(0,0,0,0.6); color: white; border: none; padding: 15px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; }

        /* NOVA BARRA LATERAL */
        .side-controls {
            position: absolute; right: 15px; bottom: 60px; display: flex; flex-direction: column; align-items: center; gap: 12px; z-index: 20;
        }
        .action-buttons {
            display: flex; flex-direction: column; gap: 12px; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0; transform: translateY(20px) scale(0); pointer-events: none;
        }
        .side-controls.expanded .action-buttons { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
        
        .btn-side {
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer;
            display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 1.1rem;
        }
        .btn-side span { font-size: 0.65rem; font-weight: bold; margin-top: 2px; }
        
        .btn-toggle-actions {
            background: var(--primary); border: none; color: white; width: 48px; height: 48px; 
            border-radius: 50%; font-size: 1.5rem; cursor: pointer; transition: transform 0.3s;
        }
        .side-controls.expanded .btn-toggle-actions { transform: rotate(45deg); background: #444; }

        .btn-fs { position: absolute; right: 15px; bottom: 15px; background: rgba(0,0,0,0.5); border: none; color: white; padding: 8px; border-radius: 8px; cursor: pointer; z-index: 10; }

        /* --- DETAILS & COMMENTS --- */
        .video-details { margin-top: 15px; background: var(--card); padding: 15px; border-radius: 15px; }
        #videoDesc { font-size: 0.85rem; color: #bbb; margin-top: 8px; cursor: pointer; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        #videoDesc.expanded { -webkit-line-clamp: unset; display: block; color: #fff; }

        .comments-section { margin-top: 10px; background: var(--card); border-radius: 15px; overflow: hidden; }
        .comments-header { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        #commentsBody { display: none; padding: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .comment-input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .comment-input-group input { flex: 1; padding: 10px; border-radius: 8px; border: none; background: #000; color: white; outline: none; }
        .comment-list { max-height: 250px; overflow-y: auto; font-size: 0.85rem; }
        .comment-item { margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.03); padding-bottom: 8px; }
        .comment-user { color: var(--primary); font-weight: 600; display: block; font-size: 0.75rem; }

        /* --- SCROLL LISTS --- */
        .section-title { margin: 25px 0 10px 0; font-size: 0.95rem; font-weight: 600; }
        .scroll-container { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .video-card { flex: 0 0 160px; background: var(--card); border-radius: 12px; overflow: hidden; cursor: pointer; transition: transform 0.2s; }
        .video-card:hover { transform: scale(1.03); }
        .thumb-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
        .thumb-video { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .card-info { padding: 8px; font-size: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .loader { 
            position: absolute; width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); 
            border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; display: none; z-index: 10;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>

<body onclick="document.getElementById('resultsList').style.display='none'">

    <div id="authScreen">
        <div class="auth-container">
            <h2 id="authTitle">YouDiana Login</h2>
            <input type="email" id="emailUser" placeholder="Seu e-mail">
            <input type="password" id="passUser" placeholder="Sua senha">
            <button class="btn-main" id="btnAuthAction" onclick="executarAuth()">Acessar</button>
            <div style="margin-top:15px;">
                <button class="btn-switch" onclick="recuperarSenha()">Esqueci minha senha</button><br>
                <button class="btn-switch" onclick="alternarModo()" id="btnSwitchLabel">Criar nova conta</button>
            </div>
        </div>
    </div>

    <div id="mainContent">
        <div class="app-logo">YouDiana Smart</div>
        <div class="user-header">
            <span id="txtUserEmail">...</span>
            <button onclick="fazerLogout()" style="background:#222; border:1px solid #444; border-radius:20px; color:white; padding: 4px 12px; cursor:pointer;">Sair</button>
        </div>

        <div class="search-container" onclick="event.stopPropagation()">
            <span class="search-icon-fixed">🔍</span>
            <input type="text" id="searchInput" placeholder="Pesquisar vídeos..." oninput="searchVideos()">
            <div class="results-list" id="resultsList"></div>
        </div>

        <div class="player-container" id="playerArea" onclick="mostrarControles()">
            <div class="loader" id="videoLoader"></div>
            <video id="videoPlayer" class="main-video" playsinline></video>
            
            <div class="side-controls" id="sideControls" onclick="event.stopPropagation()">
                <div class="action-buttons">
                    <button class="btn-side" onclick="registrarCurtida()">❤️ <span id="likeCountSide">0</span></button>
                    <button class="btn-side" onclick="toggleComments()">🗨 <span id="commentCountSide">0</span></button>
                    <button class="btn-side" onclick="registrarCompartilhamento()">↪ <span id="shareCountSide">0</span></button>
                </div>
                <button class="btn-toggle-actions" onclick="toggleSideMenu()">+</button>
            </div>

            <div class="overlay-controls" id="controlsPanel">
                <button class="btn-overlay" onclick="event.stopPropagation(); playPrevious()">⏮</button>
                <button class="btn-overlay" onclick="event.stopPropagation(); skipTime(-10)">-10s</button>
                <button class="btn-overlay" onclick="event.stopPropagation(); togglePlay()"><span id="playIcon">⏸</span></button>
                <button class="btn-overlay" onclick="event.stopPropagation(); skipTime(10)">+10s</button>
                <button class="btn-overlay" onclick="event.stopPropagation(); playNext()">⏭</button>
            </div>
            <button class="btn-fs" onclick="toggleFullScreen(event)">⛶ Tela Cheia</button>
        </div>

        <div class="video-details">
            <h3 id="playingNow" style="margin:0; font-size: 1rem;">Carregando...</h3>
            <p id="videoDesc" onclick="this.classList.toggle('expanded')"></p>
        </div>

        <div class="comments-section">
            <div class="comments-header" onclick="toggleComments()">
                <span style="font-weight: 600; font-size: 0.85rem;">Comentários (<span id="commentCount">0</span>)</span>
                <span id="commentArrow">▼</span>
            </div>
            <div id="commentsBody">
                <div class="comment-input-group">
                    <input type="text" id="newComment" placeholder="O que você achou?">
                    <button class="btn-main" style="width: auto; padding: 0 15px;" onclick="enviarComentario()">Postar</button>
                </div>
                <div class="comment-list" id="commentList"></div>
            </div>
        </div>

        <h4 class="section-title">✨ Adicionados recentemente</h4>
        <div class="scroll-container" id="recentList"></div>

        <div id="sectionHistory" style="display:none;">
            <h4 class="section-title">🕒 Continuar assistindo</h4>
            <div class="scroll-container" id="historyList"></div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, sendEmailVerification, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, onValue, set, push, update, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBc-qchU3a3Z2Jr1ijPolIT7PNHZz86G_I",
        authDomain: "youvideo-22f8a.firebaseapp.com",
        databaseURL: "https://youvideo-22f8a-default-rtdb.firebaseio.com",
        projectId: "youvideo-22f8a",
        storageBucket: "youvideo-22f8a.firebasestorage.app",
        messagingSenderId: "179003131728",
        appId: "1:179003131728:web:03874cc5df997f6c724e55"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let biblioteca = [];
    let currentIndex = -1;
    let controlTimer;
    let userAtual = null;
    let historico = JSON.parse(localStorage.getItem('user_history')) || [];

    // --- AUTH LOGIC ---
    window.alternarModo = () => {
        const t = document.getElementById('authTitle');
        const isLogin = t.innerText.includes("Login");
        t.innerText = isLogin ? "Criar Conta" : "YouDiana Login";
        document.getElementById('btnAuthAction').innerText = isLogin ? "Cadastrar" : "Acessar";
        document.getElementById('btnSwitchLabel').innerText = isLogin ? "Já tenho conta" : "Criar nova conta";
    };

    window.executarAuth = () => {
        const email = document.getElementById('emailUser').value;
        const senha = document.getElementById('passUser').value;
        const isLogin = document.getElementById('authTitle').innerText.includes("Login");

        if (isLogin) {
            signInWithEmailAndPassword(auth, email, senha).catch(e => alert("Erro: " + e.message));
        } else {
            createUserWithEmailAndPassword(auth, email, senha).then(res => {
                sendEmailVerification(res.user);
                alert("Verifique seu e-mail!");
                signOut(auth);
                alternarModo();
            }).catch(e => alert("Erro: " + e.message));
        }
    };

    window.recuperarSenha = () => {
        const email = document.getElementById('emailUser').value;
        if (!email) return alert("Digite seu e-mail.");
        sendPasswordResetEmail(auth, email).then(() => alert("E-mail enviado!")).catch(e => alert(e.message));
    };

    window.fazerLogout = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user && user.emailVerified) {
            userAtual = user;
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('mainContent').style.display = 'flex';
            document.getElementById('txtUserEmail').innerText = user.email;
            conectarBanco();
        } else {
            document.getElementById('authScreen').style.display = 'flex';
            document.getElementById('mainContent').style.display = 'none';
        }
    });

    // --- INTERFACE & SIDE MENU ---
    window.toggleSideMenu = () => {
        document.getElementById('sideControls').classList.toggle('expanded');
    };

    window.mostrarControles = () => {
        const p = document.getElementById('controlsPanel');
        p.classList.add('active');
        clearTimeout(controlTimer);
        controlTimer = setTimeout(() => p.classList.remove('active'), 3000);
    };

    window.togglePlay = () => {
        const vp = document.getElementById('videoPlayer');
        vp.paused ? vp.play() : vp.pause();
        document.getElementById('playIcon').innerText = vp.paused ? "▶" : "⏸";
    };

    window.toggleFullScreen = (e) => {
        e.stopPropagation();
        const container = document.getElementById('playerArea');
        if (!document.fullscreenElement) container.requestFullscreen();
        else document.exitFullscreen();
    };

    // --- DATA LOGIC ---
    function conectarBanco() {
        onValue(ref(db, 'videos'), (snap) => {
            const data = snap.val();
            if(data) {
                biblioteca = Object.keys(data).map(k => ({ id_firebase: k, ...data[k] }));
                if(currentIndex === -1) carregarVideo(biblioteca.length - 1);
                renderLists();
            }
        });
    }

    window.carregarVideo = (idx) => {
        if(idx < 0 || idx >= biblioteca.length) return;
        currentIndex = idx;
        const v = biblioteca[idx];
        const vp = document.getElementById('videoPlayer');
        vp.src = v.arquivo;
        vp.play();
        
        document.getElementById('playingNow').innerText = v.titulo;
        document.getElementById('videoDesc').innerText = v.descricao || "Sem descrição.";
        document.getElementById('likeCountSide').innerText = v.curtidas || 0;
        document.getElementById('shareCountSide').innerText = v.compartilhamentos || 0;
        
        // Histórico
        historico = historico.filter(i => i.id_firebase !== v.id_firebase);
        historico.unshift(v);
        if(historico.length > 15) historico.pop();
        localStorage.setItem('user_history', JSON.stringify(historico));
        
        renderLists();
        carregarComentarios(v.id_firebase);
        document.getElementById('sideControls').classList.remove('expanded');
    };

    function renderLists() {
        const recent = [...biblioteca].reverse().slice(0, 10);
        document.getElementById('recentList').innerHTML = recent.map(v => `
            <div class="video-card" onclick="carregarVideo(${biblioteca.indexOf(v)})">
                <div class="thumb-wrapper"><video class="thumb-video" muted src="${v.arquivo}"></video></div>
                <div class="card-info"><b>${v.titulo}</b></div>
            </div>`).join('');

        const hSec = document.getElementById('sectionHistory');
        if(historico.length > 0) {
            hSec.style.display = 'block';
            document.getElementById('historyList').innerHTML = historico.map(v => `
                <div class="video-card" onclick="reproduzirDoHistorico('${v.id_firebase}')">
                    <div class="thumb-wrapper"><video class="thumb-video" muted src="${v.arquivo}"></video></div>
                    <div class="card-info"><b>${v.titulo}</b></div>
                </div>`).join('');
        }
    }

    window.reproduzirDoHistorico = (id) => {
        const idx = biblioteca.findIndex(v => v.id_firebase === id);
        if(idx !== -1) carregarVideo(idx);
    };

    window.registrarCurtida = () => {
        const id = biblioteca[currentIndex].id_firebase;
        update(ref(db, `videos/${id}`), { curtidas: increment(1) });
    };

    window.registrarCompartilhamento = () => {
        const id = biblioteca[currentIndex].id_firebase;
        const url = window.location.href;
        if(navigator.share) {
            navigator.share({ title: 'YouDiana', url }).then(() => update(ref(db, `videos/${id}`), { compartilhamentos: increment(1) }));
        } else {
            navigator.clipboard.writeText(url);
            alert("Copiado!");
            update(ref(db, `videos/${id}`), { compartilhamentos: increment(1) });
        }
    };

    window.toggleComments = () => {
        const b = document.getElementById('commentsBody');
        b.style.display = b.style.display === 'block' ? 'none' : 'block';
    };

    function carregarComentarios(id) {
        onValue(ref(db, `comentarios/${id}`), (s) => {
            const data = s.val();
            const count = data ? Object.keys(data).length : 0;
            document.getElementById('commentCount').innerText = count;
            document.getElementById('commentCountSide').innerText = count;
            document.getElementById('commentList').innerHTML = data ? 
                Object.values(data).reverse().map(c => `<div class="comment-item"><span class="comment-user">${c.usuario}</span>${c.texto}</div>`).join('') : "Sem comentários.";
        });
    }

    window.enviarComentario = () => {
        const input = document.getElementById('newComment');
        if(!input.value.trim()) return;
        const refC = push(ref(db, `comentarios/${biblioteca[currentIndex].id_firebase}`));
        set(refC, { usuario: userAtual.email.split('@')[0], texto: input.value, data: Date.now() });
        input.value = "";
    };

    window.searchVideos = () => {
        const t = document.getElementById('searchInput').value.toLowerCase();
        const l = document.getElementById('resultsList');
        if(!t) { l.style.display = 'none'; return; }
        const f = biblioteca.filter(v => v.titulo.toLowerCase().includes(t));
        l.innerHTML = f.map(v => `<div class="video-item" onclick="carregarVideo(${biblioteca.indexOf(v)})">${v.titulo}</div>`).join('');
        l.style.display = f.length ? 'flex' : 'none';
    };

    window.skipTime = (s) => document.getElementById('videoPlayer').currentTime += s;
    window.playNext = () => carregarVideo((currentIndex + 1) % biblioteca.length);
    window.playPrevious = () => carregarVideo((currentIndex - 1 + biblioteca.length) % biblioteca.length);

    const loader = document.getElementById('videoLoader'), vp = document.getElementById('videoPlayer');
    vp.onwaiting = () => loader.style.display = 'block';
    vp.onplaying = () => loader.style.display = 'none';
    vp.onended = () => window.playNext();
</script>

</body>
</html>
