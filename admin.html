            <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - YouVideo Smart</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }

        h2 { color: #333; text-align: center; margin-bottom: 25px; }

        label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-save { background-color: #2ecc71; color: white; margin-bottom: 10px; }
        .btn-save:hover { background-color: #27ae60; }

        .btn-delete { background-color: #ff4757; color: white; margin-top: 20px; }
        .btn-delete:hover { background-color: #ff2e44; }

        hr { border: 0; border-top: 1px solid #eee; margin: 30px 0; }

        .video-list { width: 100%; }
        .video-item {
            background: #fff;
            padding: 10px 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 5px solid #ff4757;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>🚀 Gerenciar Vídeos</h2>
        
        <label>Título do Vídeo:</label>
        <input type="text" id="titulo" placeholder="Ex: Aula de Programação">

        <label>Link/Caminho do Vídeo:</label>
        <input type="text" id="caminho" placeholder="Ex: videos/aula1.mp4">

        <button class="btn-save" onclick="salvarVideo()">💾 Salvar Vídeo</button>

        <hr>

        <div id="listaVideos" class="video-list">
            <p style="text-align: center; color: #999;">Carregando lista...</p>
        </div>

        <button class="btn-delete" onclick="limparBanco()">🗑️ Limpar Todos os Vídeos</button>
    </div>

    <script type="module">
        // Importações do Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Sua Configuração (Mantenha igual)
        const firebaseConfig = {
            apiKey: "AIzaSyBc-qchU3a3Z2Jr1ijPolIT7PNHZz86G_I",
            authDomain: "youvideo-22f8a.firebaseapp.com",
            databaseURL: "https://youvideo-22f8a-default-rtdb.firebaseio.com",
            projectId: "youvideo-22f8a",
            storageBucket: "youvideo-22f8a.firebasestorage.app",
            messagingSenderId: "179003131728",
            appId: "1:179003131728:web:03874cc5df997f6c724e55"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const videosRef = ref(db, 'videos');

        // FUNÇÃO PARA SALVAR
        window.salvarVideo = function() {
            const titulo = document.getElementById('titulo').value;
            const arquivo = document.getElementById('caminho').value;

            if (titulo === "" || arquivo === "") {
                alert("Por favor, preencha todos os campos!");
                return;
            }

            const novoVideoRef = push(videosRef);
            set(novoVideoRef, {
                titulo: titulo,
                arquivo: arquivo,
                curtidas: 0,
                compartilhamentos: 0
            }).then(() => {
                alert("Vídeo cadastrado!");
                document.getElementById('titulo').value = "";
                document.getElementById('caminho').value = "";
            });
        };

        // FUNÇÃO PARA LIMPAR TUDO
        window.limparBanco = function() {
            if (confirm("⚠️ ATENÇÃO: Deseja realmente APAGAR TODOS os vídeos cadastrados? Isso não pode ser desfeito.")) {
                remove(videosRef).then(() => {
                    alert("Base de dados limpa com sucesso!");
                }).catch((error) => {
                    alert("Erro ao limpar: " + error.message);
                });
            }
        };

        // LISTAR VÍDEOS NA TELA DO ADMIN
        onValue(videosRef, (snapshot) => {
            const listaDiv = document.getElementById('listaVideos');
            listaDiv.innerHTML = "<h4>Vídeos Online:</h4>";
            
            const data = snapshot.val();
            if (data) {
                Object.keys(data).forEach(key => {
                    const video = data[key];
                    const item = document.createElement('div');
                    item.className = 'video-item';
                    item.innerHTML = `<span>${video.titulo}</span>`;
                    listaDiv.appendChild(item);
                });
            } else {
                listaDiv.innerHTML = "<p style='text-align:center;color:#999;'>Nenhum vídeo encontrado.</p>";
            }
        });
    </script>
</body>
</html>
